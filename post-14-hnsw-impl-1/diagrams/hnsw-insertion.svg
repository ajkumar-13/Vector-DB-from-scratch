<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550">
  <defs>
    <linearGradient id="stepGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#74c0fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#339af0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stepGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd43b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fab005;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stepGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#69db7c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#40c057;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stepGrad4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b197fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7950f2;stop-opacity:1" />
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowDown" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L0,10 L10,5 z" fill="#868e96"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="550" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#212529">HNSW Insertion Algorithm</text>
  <text x="400" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#868e96">4 steps to insert a new node into the graph</text>

  <!-- Step 1 -->
  <rect x="40" y="80" width="170" height="110" rx="10" fill="white" stroke="#339af0" stroke-width="2" filter="url(#dropShadow)"/>
  <rect x="40" y="80" width="170" height="28" rx="10" fill="url(#stepGrad1)"/>
  <rect x="40" y="96" width="170" height="12" fill="url(#stepGrad1)"/>
  <text x="55" y="99" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">Step 1: Assign Level</text>
  <text x="125" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#495057">Draw random level using</text>
  <text x="125" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#495057">exponential distribution:</text>
  <text x="125" y="160" text-anchor="middle" font-family="monospace" font-size="9" fill="#1971c2">⌊-ln(rand()) × mL⌋</text>
  <text x="125" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#868e96">Most nodes → Layer 0 only</text>

  <!-- Arrow 1→2 -->
  <line x1="210" y1="135" x2="235" y2="135" stroke="#868e96" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- Step 2 -->
  <rect x="240" y="80" width="170" height="110" rx="10" fill="white" stroke="#fab005" stroke-width="2" filter="url(#dropShadow)"/>
  <rect x="240" y="80" width="170" height="28" rx="10" fill="url(#stepGrad2)"/>
  <rect x="240" y="96" width="170" height="12" fill="url(#stepGrad2)"/>
  <text x="255" y="99" font-family="Arial, sans-serif" font-size="12" fill="#212529" font-weight="bold">Step 2: Find Entry</text>
  <text x="325" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#495057">Start at entry point</text>
  <text x="325" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#495057">(top layer). Greedy</text>
  <text x="325" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#495057">descend to insert level:</text>
  <text x="325" y="174" text-anchor="middle" font-family="monospace" font-size="9" fill="#e67700">ef = 1, greedy_closest()</text>

  <!-- Arrow 2→3 -->
  <line x1="410" y1="135" x2="435" y2="135" stroke="#868e96" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- Step 3 -->
  <rect x="440" y="80" width="170" height="110" rx="10" fill="white" stroke="#40c057" stroke-width="2" filter="url(#dropShadow)"/>
  <rect x="440" y="80" width="170" height="28" rx="10" fill="url(#stepGrad3)"/>
  <rect x="440" y="96" width="170" height="12" fill="url(#stepGrad3)"/>
  <text x="455" y="99" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">Step 3: Search Layer</text>
  <text x="525" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#495057">At each layer ≤ insert</text>
  <text x="525" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#495057">level, run beam search</text>
  <text x="525" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#495057">to find ef_construction</text>
  <text x="525" y="174" text-anchor="middle" font-family="monospace" font-size="9" fill="#2b8a3e">nearest neighbors</text>

  <!-- Arrow 3→4 -->
  <line x1="610" y1="135" x2="635" y2="135" stroke="#868e96" stroke-width="2" marker-end="url(#arrowDown)"/>

  <!-- Step 4 -->
  <rect x="640" y="80" width="140" height="110" rx="10" fill="white" stroke="#7950f2" stroke-width="2" filter="url(#dropShadow)"/>
  <rect x="640" y="80" width="140" height="28" rx="10" fill="url(#stepGrad4)"/>
  <rect x="640" y="96" width="140" height="12" fill="url(#stepGrad4)"/>
  <text x="655" y="99" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">Step 4: Connect</text>
  <text x="710" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#495057">Select M best</text>
  <text x="710" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#495057">neighbors (heuristic)</text>
  <text x="710" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#495057">Add bidirectional</text>
  <text x="710" y="174" text-anchor="middle" font-family="monospace" font-size="9" fill="#6741d9">edges on each layer</text>

  <!-- Visual Example: Graph Before and After -->
  <!-- Before: existing graph -->
  <rect x="40" y="220" width="340" height="300" rx="10" fill="white" stroke="#dee2e6" stroke-width="1" filter="url(#dropShadow)"/>
  <text x="210" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#495057">Before Insertion</text>

  <!-- Existing nodes -->
  <circle cx="120" cy="320" r="18" fill="#d3f9d8" stroke="#40c057" stroke-width="2"/>
  <text x="120" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2b8a3e">A</text>
  <circle cx="250" cy="290" r="18" fill="#d3f9d8" stroke="#40c057" stroke-width="2"/>
  <text x="250" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2b8a3e">B</text>
  <circle cx="300" cy="410" r="18" fill="#d3f9d8" stroke="#40c057" stroke-width="2"/>
  <text x="300" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2b8a3e">C</text>
  <circle cx="160" cy="440" r="18" fill="#d3f9d8" stroke="#40c057" stroke-width="2"/>
  <text x="160" y="444" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2b8a3e">D</text>
  <circle cx="310" cy="340" r="18" fill="#d3f9d8" stroke="#40c057" stroke-width="2"/>
  <text x="310" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2b8a3e">E</text>

  <!-- Existing edges -->
  <line x1="138" y1="320" x2="232" y2="290" stroke="#69db7c" stroke-width="2"/>
  <line x1="268" y1="290" x2="292" y2="340" stroke="#69db7c" stroke-width="2"/>
  <line x1="300" y1="358" x2="300" y2="392" stroke="#69db7c" stroke-width="2"/>
  <line x1="138" y1="335" x2="145" y2="425" stroke="#69db7c" stroke-width="2"/>
  <line x1="178" y1="440" x2="282" y2="410" stroke="#69db7c" stroke-width="2"/>

  <!-- After: graph with new node -->
  <rect x="420" y="220" width="360" height="300" rx="10" fill="white" stroke="#dee2e6" stroke-width="1" filter="url(#dropShadow)"/>
  <text x="600" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#495057">After Insertion (M=2)</text>

  <!-- Same nodes -->
  <circle cx="500" cy="320" r="18" fill="#d3f9d8" stroke="#40c057" stroke-width="2"/>
  <text x="500" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2b8a3e">A</text>
  <circle cx="630" cy="290" r="18" fill="#d3f9d8" stroke="#40c057" stroke-width="2"/>
  <text x="630" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2b8a3e">B</text>
  <circle cx="680" cy="410" r="18" fill="#d3f9d8" stroke="#40c057" stroke-width="2"/>
  <text x="680" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2b8a3e">C</text>
  <circle cx="540" cy="440" r="18" fill="#d3f9d8" stroke="#40c057" stroke-width="2"/>
  <text x="540" y="444" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2b8a3e">D</text>
  <circle cx="690" cy="340" r="18" fill="#d3f9d8" stroke="#40c057" stroke-width="2"/>
  <text x="690" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2b8a3e">E</text>

  <!-- Existing edges (grey) -->
  <line x1="518" y1="320" x2="612" y2="290" stroke="#dee2e6" stroke-width="1.5"/>
  <line x1="648" y1="290" x2="672" y2="340" stroke="#dee2e6" stroke-width="1.5"/>
  <line x1="680" y1="358" x2="680" y2="392" stroke="#dee2e6" stroke-width="1.5"/>
  <line x1="518" y1="335" x2="525" y2="425" stroke="#dee2e6" stroke-width="1.5"/>
  <line x1="558" y1="440" x2="662" y2="410" stroke="#dee2e6" stroke-width="1.5"/>

  <!-- NEW NODE -->
  <circle cx="580" cy="370" r="20" fill="#dbe4ff" stroke="#339af0" stroke-width="3"/>
  <text x="580" y="374" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1971c2">Q</text>
  <text x="580" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#339af0">new</text>

  <!-- New edges (blue, bold) -->
  <line x1="598" y1="365" x2="672" y2="345" stroke="#339af0" stroke-width="2.5"/>
  <line x1="595" y1="380" x2="662" y2="405" stroke="#339af0" stroke-width="2.5"/>

  <!-- Legend -->
  <line x1="440" y1="500" x2="460" y2="500" stroke="#69db7c" stroke-width="2"/>
  <text x="465" y="504" font-family="Arial, sans-serif" font-size="9" fill="#495057">Existing edge</text>
  <line x1="550" y1="500" x2="570" y2="500" stroke="#339af0" stroke-width="2.5"/>
  <text x="575" y="504" font-family="Arial, sans-serif" font-size="9" fill="#495057">New edges (M=2 neighbors)</text>
</svg>