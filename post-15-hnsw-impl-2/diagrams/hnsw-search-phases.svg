<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <defs>
    <linearGradient id="phaseGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8787;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fa5252;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="phaseGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#74c0fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#339af0;stop-opacity:1" />
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="searchArrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#fa5252"/>
    </marker>
    <marker id="beamArrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#339af0"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#212529">HNSW Search: Two-Phase Algorithm</text>
  <text x="400" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#868e96">Phase 1: Greedy descent through upper layers → Phase 2: Beam search at base layer</text>

  <!-- Phase 1 Box -->
  <rect x="30" y="70" width="360" height="380" rx="10" fill="white" stroke="#fa5252" stroke-width="2" filter="url(#dropShadow)"/>
  <rect x="30" y="70" width="360" height="28" rx="10" fill="url(#phaseGrad1)"/>
  <rect x="30" y="86" width="360" height="12" fill="url(#phaseGrad1)"/>
  <text x="50" y="89" font-family="Arial, sans-serif" font-size="13" fill="white" font-weight="bold">Phase 1: Greedy Descent (ef=1)</text>

  <!-- Layer 2 -->
  <rect x="55" y="115" width="310" height="70" rx="6" fill="#fff5f5" stroke="#ffc9c9" stroke-width="1"/>
  <text x="65" y="132" font-family="Arial, sans-serif" font-size="10" fill="#c92a2a" font-weight="bold">Layer 2 (top)</text>

  <circle cx="120" cy="160" r="14" fill="#ffe3e3" stroke="#fa5252" stroke-width="2"/>
  <text x="120" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c92a2a">EP</text>
  <circle cx="280" cy="160" r="14" fill="#ffe3e3" stroke="#ffc9c9" stroke-width="1.5"/>
  <text x="280" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c92a2a">N₁</text>
  <line x1="134" y1="160" x2="266" y2="160" stroke="#fa5252" stroke-width="2" marker-end="url(#searchArrow)"/>
  <text x="200" y="153" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fa5252">closer to query</text>

  <!-- Layer 1 -->
  <rect x="55" y="200" width="310" height="70" rx="6" fill="#fff9db" stroke="#fcc419" stroke-width="1"/>
  <text x="65" y="217" font-family="Arial, sans-serif" font-size="10" fill="#e67700" font-weight="bold">Layer 1</text>

  <circle cx="280" cy="245" r="14" fill="#fff3bf" stroke="#fcc419" stroke-width="2"/>
  <text x="280" y="249" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e67700">N₁</text>
  <circle cx="180" cy="245" r="14" fill="#fff3bf" stroke="#fcc419" stroke-width="1.5"/>
  <text x="180" y="249" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e67700">N₂</text>
  <line x1="266" y1="245" x2="194" y2="245" stroke="#fa5252" stroke-width="2" marker-end="url(#searchArrow)"/>
  <text x="230" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fa5252">closer</text>

  <!-- Dashed arrow down to layer 0 -->
  <line x1="180" y1="270" x2="180" y2="295" stroke="#868e96" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="200" y="290" font-family="Arial, sans-serif" font-size="8" fill="#868e96">descend</text>

  <!-- Layer 0 partial in Phase 1 -->
  <rect x="55" y="300" width="310" height="70" rx="6" fill="#ebfbee" stroke="#69db7c" stroke-width="1"/>
  <text x="65" y="317" font-family="Arial, sans-serif" font-size="10" fill="#2b8a3e" font-weight="bold">Layer 0 → hand off to Phase 2</text>
  <circle cx="180" cy="345" r="14" fill="#d3f9d8" stroke="#40c057" stroke-width="2"/>
  <text x="180" y="349" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2b8a3e">N₂</text>
  <text x="220" y="349" font-family="Arial, sans-serif" font-size="9" fill="#868e96">= best entry point</text>

  <!-- Phase 1 summary -->
  <text x="210" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#868e96">Single best candidate per layer</text>
  <text x="210" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#868e96">Fast: O(log N) layers traversed</text>
  <text x="210" y="431" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#868e96">Coarse approximation only</text>

  <!-- Phase 2 Box -->
  <rect x="410" y="70" width="370" height="380" rx="10" fill="white" stroke="#339af0" stroke-width="2" filter="url(#dropShadow)"/>
  <rect x="410" y="70" width="370" height="28" rx="10" fill="url(#phaseGrad2)"/>
  <rect x="410" y="86" width="370" height="12" fill="url(#phaseGrad2)"/>
  <text x="430" y="89" font-family="Arial, sans-serif" font-size="13" fill="white" font-weight="bold">Phase 2: Beam Search (ef=ef_search)</text>

  <!-- Beam search visualization -->
  <rect x="435" y="115" width="320" height="240" rx="6" fill="#e7f5ff" stroke="#74c0fc" stroke-width="1"/>
  <text x="445" y="132" font-family="Arial, sans-serif" font-size="10" fill="#1971c2" font-weight="bold">Layer 0 (base) — explore multiple candidates</text>

  <!-- Query node -->
  <circle cx="720" cy="250" r="16" fill="#ff8787" stroke="#fa5252" stroke-width="2"/>
  <text x="720" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">Q</text>
  <text x="720" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fa5252">query</text>

  <!-- Beam candidates -->
  <circle cx="480" cy="200" r="14" fill="#d3f9d8" stroke="#40c057" stroke-width="2"/>
  <text x="480" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2b8a3e">N₂</text>
  <circle cx="560" cy="170" r="14" fill="#dbe4ff" stroke="#339af0" stroke-width="2"/>
  <text x="560" y="174" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1971c2">N₃</text>
  <circle cx="630" cy="210" r="14" fill="#dbe4ff" stroke="#339af0" stroke-width="2"/>
  <text x="630" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1971c2">N₄</text>
  <circle cx="540" cy="260" r="14" fill="#dbe4ff" stroke="#339af0" stroke-width="2"/>
  <text x="540" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1971c2">N₅</text>
  <circle cx="650" cy="280" r="14" fill="#dbe4ff" stroke="#339af0" stroke-width="2"/>
  <text x="650" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1971c2">N₆</text>
  <circle cx="490" cy="310" r="14" fill="#dee2e6" stroke="#adb5bd" stroke-width="1.5"/>
  <text x="490" y="314" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#868e96">N₇</text>

  <!-- Search edges (blue) -->
  <line x1="494" y1="200" x2="546" y2="175" stroke="#339af0" stroke-width="1.5" marker-end="url(#beamArrow)"/>
  <line x1="494" y1="205" x2="616" y2="210" stroke="#339af0" stroke-width="1.5" marker-end="url(#beamArrow)"/>
  <line x1="494" y1="210" x2="528" y2="252" stroke="#339af0" stroke-width="1.5" marker-end="url(#beamArrow)"/>
  <line x1="560" y1="184" x2="620" y2="200" stroke="#339af0" stroke-width="1.2"/>
  <line x1="630" y1="224" x2="643" y2="268" stroke="#339af0" stroke-width="1.2"/>

  <!-- Distance lines to query (dashed) -->
  <line x1="644" y1="210" x2="705" y2="245" stroke="#fa5252" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="664" y1="280" x2="705" y2="255" stroke="#fa5252" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Results box -->
  <rect x="435" y="365" width="320" height="70" rx="6" fill="white" stroke="#339af0" stroke-width="1.5"/>
  <text x="445" y="383" font-family="Arial, sans-serif" font-size="10" fill="#1971c2" font-weight="bold">Result: top-k from ef_search candidates</text>
  <text x="595" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#495057">Candidates explored = ef_search (e.g. 64)</text>
  <text x="595" y="413" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#495057">Return k closest (e.g. k=10, sorted by distance)</text>
  <text x="595" y="426" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#868e96">Higher ef_search → better recall, slower</text>
</svg>