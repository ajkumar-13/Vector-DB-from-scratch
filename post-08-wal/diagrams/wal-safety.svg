<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="walGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8787;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fa5252;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="safeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#69db7c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#40c057;stop-opacity:1" />
    </linearGradient>
    <marker id="walArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#495057"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="450" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#212529">Write-Ahead Log: The Safety Net</text>
  <text x="400" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#868e96">Log the operation BEFORE applying it to indexes</text>
  
  <!-- Without WAL Section -->
  <rect x="40" y="70" width="340" height="170" rx="10" fill="white" stroke="#fa5252" stroke-width="2"/>
  <rect x="40" y="70" width="340" height="30" rx="10" fill="url(#walGrad)"/>
  <rect x="40" y="88" width="340" height="12" fill="url(#walGrad)"/>
  <text x="210" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">❌ Without WAL</text>
  
  <!-- Without WAL flow -->
  <rect x="60" y="115" width="80" height="35" rx="4" fill="#e7f5ff" stroke="#74c0fc" stroke-width="1"/>
  <text x="100" y="137" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1971c2">Insert</text>
  
  <line x1="140" y1="132" x2="170" y2="132" stroke="#495057" stroke-width="1" marker-end="url(#walArrow)"/>
  
  <rect x="175" y="115" width="90" height="35" rx="4" fill="#fff9db" stroke="#fcc419" stroke-width="1"/>
  <text x="220" y="137" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e67700">Update Index</text>
  
  <line x1="265" y1="132" x2="295" y2="132" stroke="#495057" stroke-width="1" marker-end="url(#walArrow)"/>
  
  <rect x="300" y="115" width="60" height="35" rx="4" fill="#ffe3e3" stroke="#fa5252" stroke-width="2"/>
  <text x="330" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#c92a2a">💥</text>
  <text x="330" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#c92a2a">CRASH</text>
  
  <!-- Lost data indicator -->
  <rect x="60" y="165" width="300" height="60" rx="6" fill="#fff5f5" stroke="#ffc9c9" stroke-width="1"/>
  <text x="210" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#c92a2a" font-weight="bold">⚠️ DATA LOST</text>
  <text x="210" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#495057">Index partially updated. Inconsistent state.</text>
  
  <!-- With WAL Section -->
  <rect x="420" y="70" width="340" height="170" rx="10" fill="white" stroke="#40c057" stroke-width="2"/>
  <rect x="420" y="70" width="340" height="30" rx="10" fill="url(#safeGrad)"/>
  <rect x="420" y="88" width="340" height="12" fill="url(#safeGrad)"/>
  <text x="590" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">✓ With WAL</text>
  
  <!-- With WAL flow -->
  <rect x="440" y="115" width="80" height="35" rx="4" fill="#e7f5ff" stroke="#74c0fc" stroke-width="1"/>
  <text x="480" y="137" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1971c2">Insert</text>
  
  <line x1="520" y1="132" x2="545" y2="132" stroke="#495057" stroke-width="1" marker-end="url(#walArrow)"/>
  
  <rect x="550" y="115" width="80" height="35" rx="4" fill="#d3f9d8" stroke="#40c057" stroke-width="2"/>
  <text x="590" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2b8a3e" font-weight="bold">Write WAL</text>
  <text x="590" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#495057">fsync!</text>
  
  <line x1="630" y1="132" x2="655" y2="132" stroke="#495057" stroke-width="1" marker-end="url(#walArrow)"/>
  
  <rect x="660" y="115" width="80" height="35" rx="4" fill="#fff9db" stroke="#fcc419" stroke-width="1"/>
  <text x="700" y="137" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e67700">Update Idx</text>
  
  <!-- Recovery -->
  <rect x="440" y="165" width="300" height="60" rx="6" fill="#ebfbee" stroke="#69db7c" stroke-width="1"/>
  <text x="590" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2b8a3e" font-weight="bold">✓ RECOVERABLE</text>
  <text x="590" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#495057">On restart: replay WAL → restore state</text>
  
  <!-- WAL Entry Format -->
  <rect x="100" y="260" width="600" height="170" rx="10" fill="white" stroke="#339af0" stroke-width="2"/>
  <text x="400" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1971c2" font-weight="bold">WAL Entry Format</text>
  
  <!-- Binary layout -->
  <rect x="130" y="310" width="540" height="50" rx="4" fill="#f1f3f5" stroke="#ced4da" stroke-width="1"/>
  
  <rect x="135" y="315" width="100" height="40" rx="2" fill="#ff8787"/>
  <text x="185" y="340" text-anchor="middle" font-family="monospace" font-size="9" fill="white" font-weight="bold">CRC32</text>
  <text x="185" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="white">4 bytes</text>
  
  <rect x="240" y="315" width="80" height="40" rx="2" fill="#ffd43b"/>
  <text x="280" y="340" text-anchor="middle" font-family="monospace" font-size="9" fill="#212529" font-weight="bold">LEN</text>
  <text x="280" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#495057">4 bytes</text>
  
  <rect x="325" y="315" width="60" height="40" rx="2" fill="#74c0fc"/>
  <text x="355" y="340" text-anchor="middle" font-family="monospace" font-size="9" fill="white" font-weight="bold">OP</text>
  <text x="355" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="white">1 byte</text>
  
  <rect x="390" y="315" width="100" height="40" rx="2" fill="#69db7c"/>
  <text x="440" y="340" text-anchor="middle" font-family="monospace" font-size="9" fill="white" font-weight="bold">ID</text>
  <text x="440" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="white">variable</text>
  
  <rect x="495" y="315" width="175" height="40" rx="2" fill="#b197fc"/>
  <text x="582" y="340" text-anchor="middle" font-family="monospace" font-size="9" fill="white" font-weight="bold">PAYLOAD (vector data)</text>
  <text x="582" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="white">variable</text>
  
  <text x="400" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#495057" font-weight="bold">📝 Append-only: Never modify, only append new entries</text>
  <text x="400" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#868e96">CRC32 verifies data integrity on recovery</text>
</svg>
