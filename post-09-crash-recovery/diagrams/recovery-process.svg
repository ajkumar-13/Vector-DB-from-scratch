<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 450">
  <defs>
    <linearGradient id="crashGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8787;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fa5252;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="recoveryGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#69db7c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#40c057;stop-opacity:1" />
    </linearGradient>
    <marker id="recArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#495057"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="750" height="450" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="375" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#212529">Crash Recovery: From Chaos to Consistency</text>
  <text x="375" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#868e96">Replaying WAL entries to restore database state</text>
  
  <!-- Timeline -->
  <line x1="50" y1="90" x2="700" y2="90" stroke="#ced4da" stroke-width="2"/>
  
  <!-- Pre-crash state -->
  <rect x="60" y="75" width="200" height="30" rx="4" fill="#d3f9d8" stroke="#40c057" stroke-width="1"/>
  <text x="160" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2b8a3e" font-weight="bold">Normal Operation</text>
  
  <!-- Crash point -->
  <rect x="270" y="70" width="80" height="40" rx="4" fill="url(#crashGrad)"/>
  <text x="310" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="white">💥</text>
  <text x="310" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">CRASH</text>
  
  <!-- Recovery -->
  <rect x="360" y="75" width="140" height="30" rx="4" fill="#fff9db" stroke="#fcc419" stroke-width="1"/>
  <text x="430" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e67700" font-weight="bold">Recovery Phase</text>
  
  <!-- Back to normal -->
  <rect x="510" y="75" width="180" height="30" rx="4" fill="#d3f9d8" stroke="#40c057" stroke-width="1"/>
  <text x="600" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2b8a3e" font-weight="bold">✓ Consistent State</text>
  
  <!-- Recovery Process Detail -->
  <rect x="50" y="130" width="650" height="300" rx="10" fill="white" stroke="#495057" stroke-width="2"/>
  <text x="375" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#212529" font-weight="bold">Recovery Process</text>
  
  <!-- Step 1: Load Checkpoint -->
  <rect x="80" y="180" width="180" height="80" rx="8" fill="#e7f5ff" stroke="#339af0" stroke-width="2"/>
  <text x="170" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1971c2" font-weight="bold">1️⃣ Load Checkpoint</text>
  <text x="170" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#495057">Last known good</text>
  <text x="170" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#495057">state on disk</text>
  <text x="170" y="255" text-anchor="middle" font-family="monospace" font-size="8" fill="#868e96">LSN: 1000</text>
  
  <line x1="260" y1="220" x2="295" y2="220" stroke="#495057" stroke-width="2" marker-end="url(#recArrow)"/>
  
  <!-- Step 2: Scan WAL -->
  <rect x="300" y="180" width="180" height="80" rx="8" fill="#fff9db" stroke="#fab005" stroke-width="2"/>
  <text x="390" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e67700" font-weight="bold">2️⃣ Scan WAL</text>
  <text x="390" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#495057">Find entries after</text>
  <text x="390" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#495057">checkpoint LSN</text>
  <text x="390" y="255" text-anchor="middle" font-family="monospace" font-size="8" fill="#868e96">LSN: 1001-1500</text>
  
  <line x1="480" y1="220" x2="515" y2="220" stroke="#495057" stroke-width="2" marker-end="url(#recArrow)"/>
  
  <!-- Step 3: Replay -->
  <rect x="520" y="180" width="160" height="80" rx="8" fill="#d3f9d8" stroke="#40c057" stroke-width="2"/>
  <text x="600" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2b8a3e" font-weight="bold">3️⃣ Replay</text>
  <text x="600" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#495057">Re-apply each</text>
  <text x="600" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#495057">operation in order</text>
  <text x="600" y="255" text-anchor="middle" font-family="monospace" font-size="8" fill="#868e96">State: Current</text>
  
  <!-- WAL visualization -->
  <rect x="80" y="290" width="600" height="50" rx="6" fill="#f1f3f5" stroke="#ced4da" stroke-width="1"/>
  <text x="90" y="310" font-family="Arial, sans-serif" font-size="9" fill="#495057" font-weight="bold">WAL:</text>
  
  <!-- WAL entries -->
  <rect x="130" y="295" width="80" height="35" rx="3" fill="#69db7c"/>
  <text x="170" y="310" text-anchor="middle" font-family="monospace" font-size="7" fill="white">INSERT 1001</text>
  <text x="170" y="323" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="white">✓ applied</text>
  
  <rect x="215" y="295" width="80" height="35" rx="3" fill="#69db7c"/>
  <text x="255" y="310" text-anchor="middle" font-family="monospace" font-size="7" fill="white">UPDATE 1002</text>
  <text x="255" y="323" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="white">✓ applied</text>
  
  <rect x="300" y="295" width="80" height="35" rx="3" fill="#69db7c"/>
  <text x="340" y="310" text-anchor="middle" font-family="monospace" font-size="7" fill="white">DELETE 1003</text>
  <text x="340" y="323" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="white">✓ applied</text>
  
  <rect x="385" y="295" width="80" height="35" rx="3" fill="#69db7c"/>
  <text x="425" y="310" text-anchor="middle" font-family="monospace" font-size="7" fill="white">INSERT 1004</text>
  <text x="425" y="323" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="white">✓ applied</text>
  
  <rect x="470" y="295" width="80" height="35" rx="3" fill="#ffc9c9" stroke="#fa5252" stroke-width="1"/>
  <text x="510" y="310" text-anchor="middle" font-family="monospace" font-size="7" fill="#c92a2a">INSERT 1005</text>
  <text x="510" y="323" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#c92a2a">partial/invalid</text>
  
  <rect x="555" y="295" width="110" height="35" rx="3" fill="#e9ecef"/>
  <text x="610" y="317" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#868e96">← truncate</text>
  
  <!-- Key points -->
  <text x="80" y="375" font-family="Arial, sans-serif" font-size="10" fill="#2b8a3e" font-weight="bold">✓ CRC32 validation ensures corrupted entries are detected</text>
  <text x="80" y="395" font-family="Arial, sans-serif" font-size="10" fill="#2b8a3e" font-weight="bold">✓ Idempotent operations can be safely replayed</text>
  <text x="80" y="415" font-family="Arial, sans-serif" font-size="10" fill="#2b8a3e" font-weight="bold">✓ Truncate incomplete entries at end of WAL</text>
</svg>
