<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 400">
  <defs>
    <linearGradient id="benchGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fa5252;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fcc419;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#40c057;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="750" height="400" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="375" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#212529">Benchmarking: Latency vs Recall Trade-off</text>
  <text x="375" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#868e96">Finding the sweet spot for your use case</text>
  
  <!-- Chart area -->
  <rect x="100" y="70" width="550" height="250" rx="8" fill="white" stroke="#ced4da" stroke-width="1"/>
  
  <!-- Y-axis (Latency) -->
  <line x1="100" y1="70" x2="100" y2="320" stroke="#495057" stroke-width="2"/>
  <text x="60" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#495057" transform="rotate(-90 60 200)">Latency (ms)</text>
  
  <text x="90" y="90" text-anchor="end" font-family="Arial, sans-serif" font-size="8" fill="#868e96">100</text>
  <text x="90" y="145" text-anchor="end" font-family="Arial, sans-serif" font-size="8" fill="#868e96">50</text>
  <text x="90" y="200" text-anchor="end" font-family="Arial, sans-serif" font-size="8" fill="#868e96">10</text>
  <text x="90" y="255" text-anchor="end" font-family="Arial, sans-serif" font-size="8" fill="#868e96">5</text>
  <text x="90" y="310" text-anchor="end" font-family="Arial, sans-serif" font-size="8" fill="#868e96">1</text>
  
  <!-- X-axis (Recall) -->
  <line x1="100" y1="320" x2="650" y2="320" stroke="#495057" stroke-width="2"/>
  <text x="375" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#495057">Recall@10</text>
  
  <text x="120" y="335" font-family="Arial, sans-serif" font-size="8" fill="#868e96">0.80</text>
  <text x="230" y="335" font-family="Arial, sans-serif" font-size="8" fill="#868e96">0.85</text>
  <text x="340" y="335" font-family="Arial, sans-serif" font-size="8" fill="#868e96">0.90</text>
  <text x="450" y="335" font-family="Arial, sans-serif" font-size="8" fill="#868e96">0.95</text>
  <text x="560" y="335" font-family="Arial, sans-serif" font-size="8" fill="#868e96">0.99</text>
  <text x="630" y="335" font-family="Arial, sans-serif" font-size="8" fill="#868e96">1.00</text>
  
  <!-- Trade-off curve -->
  <path d="M120 280 Q 200 260, 280 250 Q 380 235, 450 200 Q 520 150, 580 100 Q 620 70, 640 60" 
        fill="none" stroke="url(#benchGrad)" stroke-width="4"/>
  
  <!-- Data points -->
  <!-- Brute Force (high recall, high latency) -->
  <circle cx="640" cy="85" r="8" fill="#fa5252" stroke="white" stroke-width="2"/>
  <text x="630" y="75" text-anchor="end" font-family="Arial, sans-serif" font-size="8" fill="#c92a2a" font-weight="bold">Brute Force</text>
  <text x="630" y="105" text-anchor="end" font-family="Arial, sans-serif" font-size="7" fill="#868e96">100% recall, 50ms</text>
  
  <!-- HNSW ef=200 -->
  <circle cx="580" cy="115" r="8" fill="#fab005" stroke="white" stroke-width="2"/>
  <text x="560" y="135" text-anchor="end" font-family="Arial, sans-serif" font-size="8" fill="#e67700" font-weight="bold">ef=200</text>
  
  <!-- HNSW ef=100 -->
  <circle cx="450" cy="190" r="8" fill="#40c057" stroke="white" stroke-width="2"/>
  <text x="430" y="210" text-anchor="end" font-family="Arial, sans-serif" font-size="8" fill="#2b8a3e" font-weight="bold">ef=100</text>
  
  <!-- HNSW ef=50 (sweet spot) -->
  <circle cx="340" cy="235" r="12" fill="#40c057" stroke="#2b8a3e" stroke-width="3"/>
  <text x="355" y="230" font-family="Arial, sans-serif" font-size="8" fill="#2b8a3e" font-weight="bold">ef=50 ⭐</text>
  <text x="355" y="245" font-family="Arial, sans-serif" font-size="7" fill="#868e96">Sweet spot!</text>
  
  <!-- HNSW ef=20 -->
  <circle cx="200" cy="265" r="8" fill="#74c0fc" stroke="white" stroke-width="2"/>
  <text x="220" y="280" font-family="Arial, sans-serif" font-size="8" fill="#1971c2" font-weight="bold">ef=20</text>
  
  <!-- Legend -->
  <rect x="100" y="365" width="550" height="25" rx="4" fill="#f1f3f5" stroke="#ced4da" stroke-width="1"/>
  <text x="180" y="382" font-family="Arial, sans-serif" font-size="9" fill="#495057">ef = HNSW search effort parameter</text>
  <text x="420" y="382" font-family="Arial, sans-serif" font-size="9" fill="#495057">Higher ef = better recall, slower search</text>
</svg>
