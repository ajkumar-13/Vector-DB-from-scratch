<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 400">
  <defs>
    <linearGradient id="segGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#748ffc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5c7cfa;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="750" height="400" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="375" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#212529">Binary Segment File Format</text>
  <text x="375" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#868e96">How we store vectors on disk efficiently</text>
  
  <!-- Segment file visualization -->
  <rect x="50" y="70" width="650" height="50" rx="4" fill="#f1f3f5" stroke="#ced4da" stroke-width="2"/>
  
  <!-- Header section -->
  <rect x="55" y="75" width="120" height="40" rx="3" fill="#ff8787"/>
  <text x="115" y="98" text-anchor="middle" font-family="monospace" font-size="10" fill="white" font-weight="bold">HEADER</text>
  <text x="115" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="white">32 bytes</text>
  
  <!-- Vector 0 -->
  <rect x="180" y="75" width="100" height="40" rx="3" fill="#69db7c"/>
  <text x="230" y="98" text-anchor="middle" font-family="monospace" font-size="10" fill="white" font-weight="bold">Vector 0</text>
  <text x="230" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="white">N×4 bytes</text>
  
  <!-- Vector 1 -->
  <rect x="285" y="75" width="100" height="40" rx="3" fill="#74c0fc"/>
  <text x="335" y="98" text-anchor="middle" font-family="monospace" font-size="10" fill="white" font-weight="bold">Vector 1</text>
  <text x="335" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="white">N×4 bytes</text>
  
  <!-- Vector 2 -->
  <rect x="390" y="75" width="100" height="40" rx="3" fill="#ffd43b"/>
  <text x="440" y="98" text-anchor="middle" font-family="monospace" font-size="9" fill="#212529" font-weight="bold">Vector 2</text>
  <text x="440" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#495057">N×4 bytes</text>
  
  <!-- More vectors -->
  <rect x="495" y="75" width="50" height="40" rx="3" fill="#e9ecef"/>
  <text x="520" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#495057">...</text>
  
  <!-- Index -->
  <rect x="550" y="75" width="145" height="40" rx="3" fill="#b197fc"/>
  <text x="622" y="98" text-anchor="middle" font-family="monospace" font-size="10" fill="white" font-weight="bold">OFFSET INDEX</text>
  <text x="622" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="white">variable</text>
  
  <!-- Header Detail -->
  <rect x="50" y="145" width="300" height="120" rx="8" fill="white" stroke="#ff8787" stroke-width="2"/>
  <text x="200" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#c92a2a" font-weight="bold">Header (32 bytes)</text>
  
  <text x="70" y="195" font-family="monospace" font-size="9" fill="#495057">magic: [u8; 4]    = b"VSEG"</text>
  <text x="70" y="212" font-family="monospace" font-size="9" fill="#495057">version: u32      = 1</text>
  <text x="70" y="229" font-family="monospace" font-size="9" fill="#495057">dimensions: u32   = 768</text>
  <text x="70" y="246" font-family="monospace" font-size="9" fill="#495057">vector_count: u64 = 10000</text>
  
  <!-- Vector Entry Detail -->
  <rect x="400" y="145" width="300" height="120" rx="8" fill="white" stroke="#40c057" stroke-width="2"/>
  <text x="550" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2b8a3e" font-weight="bold">Vector Entry</text>
  
  <rect x="420" y="190" width="60" height="25" rx="3" fill="#ffc9c9"/>
  <text x="450" y="207" text-anchor="middle" font-family="monospace" font-size="8" fill="#c92a2a">id_len</text>
  
  <rect x="485" y="190" width="80" height="25" rx="3" fill="#ffd8a8"/>
  <text x="525" y="207" text-anchor="middle" font-family="monospace" font-size="8" fill="#e67700">id bytes</text>
  
  <rect x="570" y="190" width="110" height="25" rx="3" fill="#69db7c"/>
  <text x="625" y="207" text-anchor="middle" font-family="monospace" font-size="8" fill="white">[f32; dims]</text>
  
  <text x="420" y="245" font-family="Arial, sans-serif" font-size="9" fill="#495057" font-weight="bold">Example (768 dims):</text>
  <text x="420" y="260" font-family="monospace" font-size="8" fill="#495057">id="doc_123" → 4 + 7 + 3072 = 3083 bytes</text>
  
  <!-- Offset calculation -->
  <rect x="50" y="290" width="650" height="95" rx="8" fill="white" stroke="#5c7cfa" stroke-width="2"/>
  <text x="375" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#3b5bdb" font-weight="bold">⚡ Fast Random Access via Memory Mapping</text>
  
  <text x="70" y="345" font-family="monospace" font-size="10" fill="#495057">offset = HEADER_SIZE + (index × vector_size)</text>
  <text x="70" y="365" font-family="monospace" font-size="10" fill="#495057">       = 32 + (index × (4 + id_len + dims×4))</text>
  
  <text x="420" y="345" font-family="Arial, sans-serif" font-size="9" fill="#2b8a3e" font-weight="bold">✓ O(1) lookup - no scanning!</text>
  <text x="420" y="365" font-family="Arial, sans-serif" font-size="9" fill="#2b8a3e" font-weight="bold">✓ mmap loads only needed pages</text>
</svg>
