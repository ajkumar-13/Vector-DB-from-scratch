<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="syncGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8787;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fa5252;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="asyncGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#69db7c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#40c057;stop-opacity:1" />
    </linearGradient>
    <marker id="timeArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#495057"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="450" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#212529">Sync vs Async: Handling Multiple Clients</text>
  <text x="400" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#868e96">Why async is essential for database servers</text>
  
  <!-- Timeline arrow -->
  <line x1="100" y1="420" x2="700" y2="420" stroke="#495057" stroke-width="2" marker-end="url(#timeArrow)"/>
  <text x="750" y="425" font-family="Arial, sans-serif" font-size="11" fill="#495057">Time →</text>
  
  <!-- SYNC Section -->
  <rect x="50" y="70" width="700" height="150" rx="10" fill="white" stroke="#fa5252" stroke-width="2"/>
  <rect x="50" y="70" width="700" height="30" rx="10" fill="url(#syncGrad)"/>
  <rect x="50" y="88" width="700" height="12" fill="url(#syncGrad)"/>
  <text x="100" y="92" font-family="Arial, sans-serif" font-size="13" fill="white" font-weight="bold">❌ Synchronous (Blocking)</text>
  
  <!-- Sync thread visualization -->
  <text x="70" y="125" font-family="Arial, sans-serif" font-size="10" fill="#495057" font-weight="bold">Thread 1:</text>
  
  <!-- Client 1 sync -->
  <rect x="140" y="115" width="200" height="25" rx="4" fill="#ffc9c9" stroke="#fa5252" stroke-width="1"/>
  <text x="240" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c92a2a">Client 1 (waiting for DB)</text>
  
  <!-- Client 2 sync (waiting) -->
  <rect x="345" y="115" width="200" height="25" rx="4" fill="#ffc9c9" stroke="#fa5252" stroke-width="1"/>
  <text x="445" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c92a2a">Client 2 (waiting for DB)</text>
  
  <!-- Client 3 waiting -->
  <rect x="550" y="115" width="180" height="25" rx="4" fill="#ffe3e3" stroke="#ffc9c9" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="640" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#868e96">Client 3 waiting...</text>
  
  <text x="70" y="165" font-family="Arial, sans-serif" font-size="10" fill="#495057" font-weight="bold">Problem:</text>
  <text x="130" y="165" font-family="Arial, sans-serif" font-size="10" fill="#c92a2a">Each client blocks the thread. 1000 clients = 1000 threads = memory exhaustion</text>
  
  <text x="70" y="200" font-family="Arial, sans-serif" font-size="10" fill="#868e96">Total time: ████████████████████████████████████████ (sequential)</text>
  
  <!-- ASYNC Section -->
  <rect x="50" y="240" width="700" height="160" rx="10" fill="white" stroke="#40c057" stroke-width="2"/>
  <rect x="50" y="240" width="700" height="30" rx="10" fill="url(#asyncGrad)"/>
  <rect x="50" y="258" width="700" height="12" fill="url(#asyncGrad)"/>
  <text x="100" y="262" font-family="Arial, sans-serif" font-size="13" fill="white" font-weight="bold">✓ Asynchronous (Non-Blocking)</text>
  
  <!-- Async timeline -->
  <text x="70" y="295" font-family="Arial, sans-serif" font-size="10" fill="#495057" font-weight="bold">Thread 1:</text>
  
  <!-- Interleaved clients -->
  <rect x="140" y="285" width="80" height="20" rx="3" fill="#69db7c" stroke="#40c057" stroke-width="1"/>
  <text x="180" y="299" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">C1 work</text>
  
  <rect x="225" y="285" width="80" height="20" rx="3" fill="#74c0fc" stroke="#339af0" stroke-width="1"/>
  <text x="265" y="299" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">C2 work</text>
  
  <rect x="310" y="285" width="80" height="20" rx="3" fill="#ffd43b" stroke="#fab005" stroke-width="1"/>
  <text x="350" y="299" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#212529">C3 work</text>
  
  <rect x="395" y="285" width="80" height="20" rx="3" fill="#69db7c" stroke="#40c057" stroke-width="1"/>
  <text x="435" y="299" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">C1 cont</text>
  
  <rect x="480" y="285" width="80" height="20" rx="3" fill="#74c0fc" stroke="#339af0" stroke-width="1"/>
  <text x="520" y="299" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">C2 cont</text>
  
  <rect x="565" y="285" width="80" height="20" rx="3" fill="#ffd43b" stroke="#fab005" stroke-width="1"/>
  <text x="605" y="299" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#212529">C3 cont</text>
  
  <rect x="650" y="285" width="80" height="20" rx="3" fill="#c3fae8" stroke="#69db7c" stroke-width="1"/>
  <text x="690" y="299" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#495057">All done!</text>
  
  <text x="70" y="335" font-family="Arial, sans-serif" font-size="10" fill="#495057" font-weight="bold">Benefit:</text>
  <text x="125" y="335" font-family="Arial, sans-serif" font-size="10" fill="#2b8a3e">While C1 waits for DB, thread works on C2, C3. Single thread handles 1000s of clients!</text>
  
  <text x="70" y="375" font-family="Arial, sans-serif" font-size="10" fill="#2b8a3e">Total time: ██████████████ (concurrent)</text>
  <text x="280" y="375" font-family="Arial, sans-serif" font-size="10" fill="#868e96">← 3x faster with same resources</text>
</svg>
