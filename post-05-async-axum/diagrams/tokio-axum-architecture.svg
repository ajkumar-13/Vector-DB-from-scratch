<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="tokioGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#748ffc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5c7cfa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="axumGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#69db7c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#40c057;stop-opacity:1" />
    </linearGradient>
    <marker id="layerArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#495057"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#212529">Tokio + Axum Architecture</text>
  <text x="400" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#868e96">How our HTTP server processes requests</text>
  
  <!-- HTTP Request -->
  <rect x="320" y="70" width="160" height="40" rx="8" fill="#e7f5ff" stroke="#339af0" stroke-width="2"/>
  <text x="400" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1971c2" font-weight="bold">🌐 HTTP Request</text>
  
  <!-- Arrow to Tokio -->
  <line x1="400" y1="110" x2="400" y2="145" stroke="#495057" stroke-width="2" marker-end="url(#layerArrow)"/>
  
  <!-- Tokio Runtime Layer -->
  <rect x="100" y="150" width="600" height="100" rx="10" fill="white" stroke="#5c7cfa" stroke-width="3"/>
  <rect x="100" y="150" width="600" height="35" rx="10" fill="url(#tokioGrad)"/>
  <rect x="100" y="173" width="600" height="12" fill="url(#tokioGrad)"/>
  <text x="130" y="175" font-family="Arial, sans-serif" font-size="14" fill="white" font-weight="bold">TOKIO RUNTIME</text>
  <text x="490" y="175" font-family="Arial, sans-serif" font-size="10" fill="#c3dafe">Async Task Scheduler</text>
  
  <!-- Tokio components -->
  <rect x="130" y="200" width="130" height="35" rx="6" fill="#e7f5ff" stroke="#74c0fc" stroke-width="1"/>
  <text x="195" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1971c2" font-weight="bold">Task Spawner</text>
  
  <rect x="280" y="200" width="130" height="35" rx="6" fill="#e7f5ff" stroke="#74c0fc" stroke-width="1"/>
  <text x="345" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1971c2" font-weight="bold">Thread Pool</text>
  
  <rect x="430" y="200" width="130" height="35" rx="6" fill="#e7f5ff" stroke="#74c0fc" stroke-width="1"/>
  <text x="495" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1971c2" font-weight="bold">I/O Driver</text>
  
  <rect x="580" y="200" width="100" height="35" rx="6" fill="#e7f5ff" stroke="#74c0fc" stroke-width="1"/>
  <text x="630" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1971c2" font-weight="bold">Timer</text>
  
  <!-- Arrow to Axum -->
  <line x1="400" y1="250" x2="400" y2="285" stroke="#495057" stroke-width="2" marker-end="url(#layerArrow)"/>
  
  <!-- Axum Layer -->
  <rect x="100" y="290" width="600" height="120" rx="10" fill="white" stroke="#40c057" stroke-width="3"/>
  <rect x="100" y="290" width="600" height="35" rx="10" fill="url(#axumGrad)"/>
  <rect x="100" y="313" width="600" height="12" fill="url(#axumGrad)"/>
  <text x="130" y="315" font-family="Arial, sans-serif" font-size="14" fill="white" font-weight="bold">AXUM FRAMEWORK</text>
  <text x="490" y="315" font-family="Arial, sans-serif" font-size="10" fill="#c3fae8">HTTP Router + Handlers</text>
  
  <!-- Axum request flow -->
  <rect x="130" y="340" width="100" height="55" rx="6" fill="#d3f9d8" stroke="#69db7c" stroke-width="1"/>
  <text x="180" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2b8a3e" font-weight="bold">Router</text>
  <text x="180" y="380" text-anchor="middle" font-family="monospace" font-size="8" fill="#495057">/search</text>
  <text x="180" y="392" text-anchor="middle" font-family="monospace" font-size="8" fill="#495057">/upsert</text>
  
  <line x1="230" y1="367" x2="258" y2="367" stroke="#495057" stroke-width="1" marker-end="url(#layerArrow)"/>
  
  <rect x="260" y="340" width="100" height="55" rx="6" fill="#d3f9d8" stroke="#69db7c" stroke-width="1"/>
  <text x="310" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2b8a3e" font-weight="bold">Extractors</text>
  <text x="310" y="380" text-anchor="middle" font-family="monospace" font-size="8" fill="#495057">Json&lt;T&gt;</text>
  <text x="310" y="392" text-anchor="middle" font-family="monospace" font-size="8" fill="#495057">State&lt;S&gt;</text>
  
  <line x1="360" y1="367" x2="388" y2="367" stroke="#495057" stroke-width="1" marker-end="url(#layerArrow)"/>
  
  <rect x="390" y="340" width="100" height="55" rx="6" fill="#d3f9d8" stroke="#69db7c" stroke-width="1"/>
  <text x="440" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2b8a3e" font-weight="bold">Handler</text>
  <text x="440" y="380" text-anchor="middle" font-family="monospace" font-size="8" fill="#495057">async fn</text>
  <text x="440" y="392" text-anchor="middle" font-family="monospace" font-size="8" fill="#495057">search()</text>
  
  <line x1="490" y1="367" x2="518" y2="367" stroke="#495057" stroke-width="1" marker-end="url(#layerArrow)"/>
  
  <rect x="520" y="340" width="160" height="55" rx="6" fill="#fff9db" stroke="#fcc419" stroke-width="1"/>
  <text x="600" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e67700" font-weight="bold">Our Engine</text>
  <text x="600" y="380" text-anchor="middle" font-family="monospace" font-size="8" fill="#495057">VectorIndex</text>
  <text x="600" y="392" text-anchor="middle" font-family="monospace" font-size="8" fill="#495057">Storage</text>
  
  <!-- Response -->
  <line x1="400" y1="410" x2="400" y2="445" stroke="#495057" stroke-width="2" marker-end="url(#layerArrow)"/>
  
  <rect x="320" y="450" width="160" height="40" rx="8" fill="#d3f9d8" stroke="#40c057" stroke-width="2"/>
  <text x="400" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2b8a3e" font-weight="bold">✓ JSON Response</text>
</svg>
