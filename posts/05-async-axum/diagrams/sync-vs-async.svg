<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-labelledby="t d">
  <title id="t">Sync vs Async: Handling Multiple Clients</title>
  <desc id="d">Two stacked timelines compare request handling. In the synchronous (blocking) model, each client occupies the thread until the database responds, so clients queue sequentially and 1000 clients require 1000 threads, exhausting memory. In the asynchronous (non-blocking) model, a single thread interleaves C1, C2, and C3 work and continuations so all finish concurrently, roughly 3x faster with the same resources.</desc>
  <style><![CDATA[
:root{--vdb-bg:#FAFAF7;--vdb-surface:#FFFFFF;--vdb-ink:#1A1A1A;--vdb-ink-muted:#5C5C5C;--vdb-ink-subtle:#9A9A9A;--vdb-border:#D9D9D4;--vdb-primary:#5B7FBF;--vdb-accent:#D98E5F;--vdb-success:#5C9E78;--vdb-warn:#B8895A;--vdb-alert:#C66B5E;--vdb-neutral-1:#EAEAE4;}
@media (prefers-color-scheme:dark){:root{--vdb-bg:#0E0F12;--vdb-surface:#16181C;--vdb-ink:#F2F2EE;--vdb-ink-muted:#B4B4AE;--vdb-ink-subtle:#6E6E68;--vdb-border:#2A2D33;--vdb-primary:#8BA8E0;--vdb-accent:#E8B088;--vdb-success:#7FBF9B;--vdb-warn:#D0A271;--vdb-alert:#D98579;--vdb-neutral-1:#1F2229;}}
.bg{fill:var(--vdb-bg);}
.title{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:20px;fill:var(--vdb-ink);}
.head{font-family:Inter,system-ui,sans-serif;font-weight:700;font-size:12px;fill:var(--vdb-ink);}
.label{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:11px;fill:var(--vdb-ink-muted);}
.mono{font-family:"JetBrains Mono",ui-monospace,Menlo,monospace;font-weight:500;font-size:13px;fill:var(--vdb-ink);}
.box{fill:var(--vdb-surface);stroke:var(--vdb-border);stroke-width:1.5;}
.box-primary{fill:var(--vdb-primary);stroke:var(--vdb-ink);stroke-width:1.5;}
.box-accent{fill:var(--vdb-accent);stroke:var(--vdb-ink);stroke-width:1.5;}
.box-success{fill:var(--vdb-success);stroke:var(--vdb-ink);stroke-width:1.5;}
.flow{stroke:var(--vdb-ink);stroke-width:1.5;fill:none;}
.flow-muted{stroke:var(--vdb-ink-muted);stroke-width:1;fill:none;stroke-dasharray:4 3;}
.on-fill{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:12px;fill:#FFFFFF;}
.subhead{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:11px;fill:var(--vdb-ink-muted);}
.cap{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:9px;fill:var(--vdb-ink);}
.cap-fill{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:9px;fill:#FFFFFF;}
.box-alert{fill:var(--vdb-alert);stroke:var(--vdb-ink);stroke-width:1.5;}
.box-warn-soft{fill:var(--vdb-neutral-1);stroke:var(--vdb-ink-subtle);stroke-width:1;stroke-dasharray:4 2;}
.section-alert{fill:var(--vdb-surface);stroke:var(--vdb-alert);stroke-width:1.5;}
.section-success{fill:var(--vdb-surface);stroke:var(--vdb-success);stroke-width:1.5;}
.bar-alert{fill:var(--vdb-alert);}
.bar-success{fill:var(--vdb-success);}
]]></style>

  <rect class="bg" x="0" y="0" width="800" height="450"/>

  <!-- Title -->
  <text class="title" x="400" y="30" text-anchor="middle">Sync vs Async: Handling Multiple Clients</text>
  <text class="label" x="400" y="50" text-anchor="middle">Why async is essential for database servers</text>

  <!-- Timeline arrow -->
  <defs>
    <marker id="timeArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="var(--vdb-ink)"/>
    </marker>
  </defs>
  <line class="flow" x1="100" y1="420" x2="700" y2="420" marker-end="url(#timeArrow)"/>
  <text class="label" x="715" y="424">Time</text>

  <!-- SYNC Section -->
  <rect class="section-alert" x="50" y="70" width="700" height="150" rx="10"/>
  <rect class="box-alert" x="50" y="70" width="700" height="30" rx="10"/>
  <rect class="box-alert" x="50" y="88" width="700" height="12" stroke="none"/>
  <circle cx="74" cy="85" r="4" fill="#FFFFFF"/>
  <text class="on-fill" x="86" y="89" font-size="12">Synchronous (Blocking)</text>

  <!-- Sync thread visualization -->
  <text class="subhead" x="70" y="128">Thread 1:</text>

  <rect class="box-alert" x="140" y="115" width="200" height="25" rx="4"/>
  <text class="cap-fill" x="240" y="131" text-anchor="middle">Client 1 (waiting for DB)</text>

  <rect class="box-alert" x="345" y="115" width="200" height="25" rx="4"/>
  <text class="cap-fill" x="445" y="131" text-anchor="middle">Client 2 (waiting for DB)</text>

  <rect class="box-warn-soft" x="550" y="115" width="180" height="25" rx="4"/>
  <text class="cap" x="640" y="131" text-anchor="middle" fill="var(--vdb-ink-muted)">Client 3 waiting...</text>

  <text class="subhead" x="70" y="168">Problem:</text>
  <text class="label" x="130" y="168" fill="var(--vdb-alert)">Each client blocks the thread. 1000 clients = 1000 threads = memory exhaustion</text>

  <text class="subhead" x="70" y="202">Total time:</text>
  <rect class="bar-alert" x="135" y="194" width="560" height="10" rx="2"/>
  <text class="label" x="135" y="216">sequential</text>

  <!-- ASYNC Section -->
  <rect class="section-success" x="50" y="240" width="700" height="160" rx="10"/>
  <rect class="box-success" x="50" y="240" width="700" height="30" rx="10"/>
  <rect class="box-success" x="50" y="258" width="700" height="12" stroke="none"/>
  <circle cx="74" cy="255" r="4" fill="#FFFFFF"/>
  <text class="on-fill" x="86" y="259" font-size="12">Asynchronous (Non-Blocking)</text>

  <!-- Async timeline -->
  <text class="subhead" x="70" y="298">Thread 1:</text>

  <rect class="box-success" x="140" y="285" width="80" height="20" rx="3"/>
  <text class="cap-fill" x="180" y="299" text-anchor="middle" font-size="8">C1 work</text>

  <rect class="box-primary" x="225" y="285" width="80" height="20" rx="3"/>
  <text class="cap-fill" x="265" y="299" text-anchor="middle" font-size="8">C2 work</text>

  <rect class="box-accent" x="310" y="285" width="80" height="20" rx="3"/>
  <text class="cap-fill" x="350" y="299" text-anchor="middle" font-size="8">C3 work</text>

  <rect class="box-success" x="395" y="285" width="80" height="20" rx="3"/>
  <text class="cap-fill" x="435" y="299" text-anchor="middle" font-size="8">C1 cont</text>

  <rect class="box-primary" x="480" y="285" width="80" height="20" rx="3"/>
  <text class="cap-fill" x="520" y="299" text-anchor="middle" font-size="8">C2 cont</text>

  <rect class="box-accent" x="565" y="285" width="80" height="20" rx="3"/>
  <text class="cap-fill" x="605" y="299" text-anchor="middle" font-size="8">C3 cont</text>

  <rect class="box" x="650" y="285" width="80" height="20" rx="3"/>
  <text class="cap" x="690" y="299" text-anchor="middle" font-size="8">All done!</text>

  <text class="subhead" x="70" y="338">Benefit:</text>
  <text class="label" x="125" y="338" fill="var(--vdb-success)">While C1 waits for DB, thread works on C2, C3. Single thread handles 1000s of clients!</text>

  <text class="subhead" x="70" y="378">Total time:</text>
  <rect class="bar-success" x="135" y="370" width="186" height="10" rx="2"/>
  <text class="label" x="331" y="378">concurrent</text>
  <text class="label" x="405" y="378" fill="var(--vdb-ink-subtle)">3x faster with same resources</text>
</svg>
