<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 400" role="img" aria-labelledby="t d">
  <title id="t">Cosine Similarity: Measuring Vector Similarity</title>
  <desc id="d">A 2D plot shows three labelled vectors from a common origin: A "cat" and B "kitten" point in nearly the same direction (small angle, sim approximately 0.95), while C "car" sits far away (large angle, sim approximately 0.20). Beside it, the cosine formula, an output range from -1 (opposite) through 0 (orthogonal) to 1 (identical), and a Rust implementation. The takeaway: cosine similarity measures the angle between vectors, so smaller angles mean more semantically similar items.</desc>
  <style><![CDATA[
:root{--vdb-bg:#FAFAF7;--vdb-surface:#FFFFFF;--vdb-ink:#1A1A1A;--vdb-ink-muted:#5C5C5C;--vdb-ink-subtle:#9A9A9A;--vdb-border:#D9D9D4;--vdb-primary:#5B7FBF;--vdb-accent:#D98E5F;--vdb-success:#5C9E78;--vdb-warn:#B8895A;--vdb-alert:#C66B5E;--vdb-neutral-1:#EAEAE4;}
@media (prefers-color-scheme:dark){:root{--vdb-bg:#0E0F12;--vdb-surface:#16181C;--vdb-ink:#F2F2EE;--vdb-ink-muted:#B4B4AE;--vdb-ink-subtle:#6E6E68;--vdb-border:#2A2D33;--vdb-primary:#8BA8E0;--vdb-accent:#E8B088;--vdb-success:#7FBF9B;--vdb-warn:#D0A271;--vdb-alert:#D98579;--vdb-neutral-1:#1F2229;}}
.bg{fill:var(--vdb-bg);}
.title{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:20px;fill:var(--vdb-ink);}
.head{font-family:Inter,system-ui,sans-serif;font-weight:700;font-size:12px;fill:var(--vdb-ink);}
.label{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:11px;fill:var(--vdb-ink-muted);}
.mono{font-family:"JetBrains Mono",ui-monospace,Menlo,monospace;font-weight:500;font-size:13px;fill:var(--vdb-ink);}
.box{fill:var(--vdb-surface);stroke:var(--vdb-border);stroke-width:1.5;}
.box-primary{fill:var(--vdb-primary);stroke:var(--vdb-ink);stroke-width:1.5;}
.box-accent{fill:var(--vdb-accent);stroke:var(--vdb-ink);stroke-width:1.5;}
.box-success{fill:var(--vdb-success);stroke:var(--vdb-ink);stroke-width:1.5;}
.flow{stroke:var(--vdb-ink);stroke-width:1.5;fill:none;}
.flow-muted{stroke:var(--vdb-ink-muted);stroke-width:1;fill:none;stroke-dasharray:4 3;}
.on-fill{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:12px;fill:#FFFFFF;}
.subtle{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:11px;fill:var(--vdb-ink-subtle);}
.axis{stroke:var(--vdb-ink-muted);stroke-width:1;fill:none;}
.vec-primary{stroke:var(--vdb-primary);stroke-width:1.5;fill:none;}
.vec-success{stroke:var(--vdb-success);stroke-width:1.5;fill:none;}
.vec-alert{stroke:var(--vdb-alert);stroke-width:1.5;fill:none;}
.arc{fill:none;stroke-width:1;}
]]></style>

  <rect class="bg" x="0" y="0" width="750" height="400"/>

  <!-- Title -->
  <text class="title" x="375" y="30" text-anchor="middle">Cosine Similarity: Measuring Vector Similarity</text>
  <text class="label" x="375" y="48" text-anchor="middle">The angle between vectors determines semantic similarity</text>

  <!-- Vector diagram panel -->
  <rect class="box" x="50" y="70" width="300" height="280" rx="8"/>

  <!-- Coordinate system -->
  <line class="axis" x1="100" y1="300" x2="320" y2="300"/>
  <line class="axis" x1="100" y1="300" x2="100" y2="100"/>
  <text class="label" x="328" y="305">x</text>
  <text class="label" x="90" y="95">y</text>

  <!-- Vector A "cat" (success) -->
  <line class="vec-success" x1="100" y1="300" x2="280" y2="150"/>
  <circle cx="280" cy="150" r="4" fill="var(--vdb-success)"/>
  <text class="head" x="290" y="145" fill="var(--vdb-success)">A "cat"</text>

  <!-- Vector B "kitten" (primary) -->
  <line class="vec-primary" x1="100" y1="300" x2="260" y2="130"/>
  <circle cx="260" cy="130" r="4" fill="var(--vdb-primary)"/>
  <text class="head" x="252" y="120" text-anchor="end" fill="var(--vdb-primary)">B "kitten"</text>

  <!-- Vector C "car" (alert) -->
  <line class="vec-alert" x1="100" y1="300" x2="300" y2="280"/>
  <circle cx="300" cy="280" r="4" fill="var(--vdb-alert)"/>
  <text class="head" x="308" y="285" fill="var(--vdb-alert)">C "car"</text>

  <!-- Angle arcs -->
  <path class="arc" d="M150 270 Q 160 250, 180 250" stroke="var(--vdb-success)"/>
  <text class="subtle" x="158" y="244" fill="var(--vdb-success)">&#952; small</text>

  <path class="arc" d="M180 290 Q 220 285, 250 290" stroke="var(--vdb-alert)"/>
  <text class="subtle" x="215" y="282" fill="var(--vdb-alert)">&#952; large</text>

  <!-- Similarity value chips -->
  <rect class="box-success" x="108" y="200" width="84" height="22" rx="4"/>
  <text class="on-fill" x="150" y="215" text-anchor="middle" font-size="11">sim &#8776; 0.95</text>

  <rect x="198" y="230" width="84" height="22" rx="4" fill="var(--vdb-surface)" stroke="var(--vdb-alert)" stroke-width="1.5"/>
  <text x="240" y="245" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-weight="600" font-size="11" fill="var(--vdb-alert)">sim &#8776; 0.20</text>

  <!-- Formula section -->
  <rect class="box" x="380" y="70" width="340" height="130" rx="8"/>
  <text class="head" x="550" y="98" text-anchor="middle">Formula</text>

  <text class="mono" x="550" y="132" text-anchor="middle" font-size="15">cos(&#952;) = (A &#183; B) / (||A|| &#215; ||B||)</text>

  <text class="label" x="400" y="166">A &#183; B = dot product (sum of element products)</text>
  <text class="label" x="400" y="184">||A|| = magnitude (sqrt of sum of squares)</text>

  <!-- Range visualization -->
  <rect class="box" x="380" y="215" width="340" height="50" rx="8" fill="var(--vdb-neutral-1)"/>
  <text class="head" x="398" y="238" font-size="11">Output Range:</text>

  <rect x="490" y="223" width="32" height="24" rx="3" fill="var(--vdb-surface)" stroke="var(--vdb-alert)" stroke-width="1.5"/>
  <text x="506" y="239" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-weight="600" font-size="11" fill="var(--vdb-alert)">-1</text>
  <text class="subtle" x="506" y="259" text-anchor="middle" font-size="8">opposite</text>

  <rect x="542" y="223" width="32" height="24" rx="3" fill="var(--vdb-surface)" stroke="var(--vdb-border)" stroke-width="1.5"/>
  <text x="558" y="239" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-weight="600" font-size="11" fill="var(--vdb-ink-muted)">0</text>
  <text class="subtle" x="558" y="259" text-anchor="middle" font-size="8">orthogonal</text>

  <rect class="box-success" x="594" y="223" width="32" height="24" rx="3"/>
  <text class="on-fill" x="610" y="239" text-anchor="middle" font-size="11">1</text>
  <text class="subtle" x="610" y="259" text-anchor="middle" font-size="8">identical</text>

  <!-- Code example -->
  <rect class="box" x="380" y="280" width="340" height="113" rx="8"/>
  <text class="mono" x="398" y="300" font-size="11"><tspan fill="var(--vdb-primary)">fn </tspan><tspan fill="var(--vdb-accent)">cosine_sim</tspan><tspan fill="var(--vdb-ink-muted)">(a: &amp;[f32], b: &amp;[f32]) -&gt; f32 {</tspan></text>
  <text class="mono" x="408" y="318" font-size="11"><tspan fill="var(--vdb-primary)">let </tspan><tspan fill="var(--vdb-ink-muted)">dot = a.iter().zip(b)</tspan></text>
  <text class="mono" x="420" y="335" font-size="11" fill="var(--vdb-ink-muted)">.map(|(x, y)| x * y).sum::&lt;f32&gt;();</text>
  <text class="mono" x="408" y="353" font-size="11"><tspan fill="var(--vdb-primary)">let </tspan><tspan fill="var(--vdb-ink-muted)">norm = |v: &amp;[f32]|</tspan></text>
  <text class="mono" x="420" y="370" font-size="11" fill="var(--vdb-ink-muted)">v.iter().map(|x| x * x).sum::&lt;f32&gt;().sqrt();</text>
  <text class="mono" x="408" y="388" font-size="11" fill="var(--vdb-ink-muted)">dot / (norm(a) * norm(b)) }</text>
</svg>
