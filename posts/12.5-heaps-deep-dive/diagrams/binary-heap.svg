<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 420" role="img" aria-labelledby="t d">
  <title id="t">Binary Heap for Efficient Top-K Selection</title>
  <desc id="d">A min-heap (K=5) drawn as a tree keeps the K best search results, with the root holding the worst of the top-5 so it can be compared cheaply against new candidates. The right panel walks through inserting candidate 0.88: compare against the heap min 0.72, accept because it is larger, then replace and heapify in O(log K). Using a heap this way costs O(N log K) overall instead of O(N log N) for full sorting, which matters for large datasets.</desc>
  <style><![CDATA[
:root{--vdb-bg:#FAFAF7;--vdb-surface:#FFFFFF;--vdb-ink:#1A1A1A;--vdb-ink-muted:#5C5C5C;--vdb-ink-subtle:#9A9A9A;--vdb-border:#D9D9D4;--vdb-primary:#5B7FBF;--vdb-accent:#D98E5F;--vdb-success:#5C9E78;--vdb-warn:#B8895A;--vdb-alert:#C66B5E;--vdb-neutral-1:#EAEAE4;}
@media (prefers-color-scheme:dark){:root{--vdb-bg:#0E0F12;--vdb-surface:#16181C;--vdb-ink:#F2F2EE;--vdb-ink-muted:#B4B4AE;--vdb-ink-subtle:#6E6E68;--vdb-border:#2A2D33;--vdb-primary:#8BA8E0;--vdb-accent:#E8B088;--vdb-success:#7FBF9B;--vdb-warn:#D0A271;--vdb-alert:#D98579;--vdb-neutral-1:#1F2229;}}
.bg{fill:var(--vdb-bg);}
.title{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:20px;fill:var(--vdb-ink);}
.head{font-family:Inter,system-ui,sans-serif;font-weight:700;font-size:12px;fill:var(--vdb-ink);}
.label{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:11px;fill:var(--vdb-ink-muted);}
.mono{font-family:"JetBrains Mono",ui-monospace,Menlo,monospace;font-weight:500;font-size:13px;fill:var(--vdb-ink);}
.box{fill:var(--vdb-surface);stroke:var(--vdb-border);stroke-width:1.5;}
.box-primary{fill:var(--vdb-primary);stroke:var(--vdb-ink);stroke-width:1.5;}
.box-accent{fill:var(--vdb-accent);stroke:var(--vdb-ink);stroke-width:1.5;}
.box-success{fill:var(--vdb-success);stroke:var(--vdb-ink);stroke-width:1.5;}
.flow{stroke:var(--vdb-ink);stroke-width:1.5;fill:none;}
.flow-muted{stroke:var(--vdb-ink-muted);stroke-width:1;fill:none;stroke-dasharray:4 3;}
.on-fill{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:12px;fill:#FFFFFF;}
]]></style>

  <rect class="bg" x="0" y="0" width="750" height="420"/>

  <!-- Title -->
  <text class="title" x="375" y="32" text-anchor="middle">Binary Heap: Efficient Top-K Selection</text>
  <text class="label" x="375" y="50" text-anchor="middle">Min-heap keeps track of K best results during search</text>

  <!-- Heap panel -->
  <rect class="box" x="50" y="70" width="350" height="290" rx="10"/>
  <text class="head" x="225" y="100" text-anchor="middle">Min-Heap (K=5)</text>

  <!-- Tree edges -->
  <line class="flow-muted" x1="207" y1="170" x2="147" y2="210"/>
  <line class="flow-muted" x1="243" y1="170" x2="303" y2="210"/>
  <line class="flow-muted" x1="131" y1="250" x2="97" y2="285"/>
  <line class="flow-muted" x1="159" y1="250" x2="193" y2="285"/>

  <!-- Level 0 (root - min) -->
  <text class="label" x="225" y="125" text-anchor="middle">min (worst of top-5)</text>
  <circle class="box-primary" cx="225" cy="150" r="25"/>
  <text class="on-fill" x="225" y="155" text-anchor="middle">0.72</text>

  <!-- Level 1 -->
  <circle class="box" cx="145" cy="230" r="22"/>
  <text class="mono" x="145" y="235" text-anchor="middle">0.78</text>
  <circle class="box" cx="305" cy="230" r="22"/>
  <text class="mono" x="305" y="235" text-anchor="middle">0.85</text>

  <!-- Level 2 -->
  <circle class="box" cx="95" cy="305" r="20"/>
  <text class="mono" x="95" y="310" text-anchor="middle">0.91</text>
  <circle class="box" cx="195" cy="305" r="20"/>
  <text class="mono" x="195" y="310" text-anchor="middle">0.95</text>

  <!-- Heap property note -->
  <text class="head" x="225" y="347" text-anchor="middle">Property: parent &#8804; children</text>

  <!-- Algorithm panel -->
  <rect class="box" x="430" y="70" width="280" height="290" rx="10"/>
  <text class="head" x="570" y="100" text-anchor="middle">Top-K Algorithm</text>

  <!-- Step 1 -->
  <rect class="box" x="450" y="115" width="240" height="55" rx="6"/>
  <rect class="box-primary" x="450" y="115" width="6" height="55"/>
  <text class="head" x="470" y="137">1. New candidate: 0.88</text>
  <text class="label" x="470" y="158">Compare with heap min (0.72)</text>

  <!-- Step 2 -->
  <rect class="box" x="450" y="180" width="240" height="55" rx="6"/>
  <rect class="box-accent" x="450" y="180" width="6" height="55"/>
  <text class="head" x="470" y="202">2. 0.88 &gt; 0.72? Yes</text>
  <text class="label" x="470" y="223">This is better than worst result</text>

  <!-- Step 3 -->
  <rect class="box" x="450" y="245" width="240" height="55" rx="6"/>
  <rect class="box-success" x="450" y="245" width="6" height="55"/>
  <text class="head" x="470" y="267">3. Replace &amp; heapify</text>
  <text class="label" x="470" y="288">Pop min, push 0.88, restore heap</text>

  <!-- Complexity per op -->
  <rect class="box" x="450" y="310" width="240" height="40" rx="6" fill="var(--vdb-neutral-1)"/>
  <text class="mono" x="570" y="335" text-anchor="middle">O(log K) per comparison</text>

  <!-- Total complexity banner -->
  <rect class="box" x="50" y="375" width="650" height="35" rx="8"/>
  <rect class="box-success" x="50" y="375" width="6" height="35"/>
  <text class="head" x="378" y="397" text-anchor="middle">Total: O(N log K) instead of O(N log N) for sorting — crucial for large datasets</text>
</svg>
