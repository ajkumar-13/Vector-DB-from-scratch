<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 400" role="img" aria-labelledby="t d">
  <title id="t">Inverted index for fast filter queries</title>
  <desc id="d">The figure contrasts a forward view, where each document maps to its metadata, with an inverted index, where each metadata value (category, author) maps to a set of matching document IDs. A worked filter query for category "tech" AND author "alice" intersects the posting lists [1,2] and [1,3] to return doc_1, showing that filtering becomes an O(1) hash lookup. The takeaway: with an inverted index you search only the vectors matching the filter, not all N vectors.</desc>
  <style><![CDATA[
:root{--vdb-bg:#FAFAF7;--vdb-surface:#FFFFFF;--vdb-ink:#1A1A1A;--vdb-ink-muted:#5C5C5C;--vdb-ink-subtle:#9A9A9A;--vdb-border:#D9D9D4;--vdb-primary:#5B7FBF;--vdb-accent:#D98E5F;--vdb-success:#5C9E78;--vdb-warn:#B8895A;--vdb-alert:#C66B5E;--vdb-neutral-1:#EAEAE4;}
@media (prefers-color-scheme:dark){:root{--vdb-bg:#0E0F12;--vdb-surface:#16181C;--vdb-ink:#F2F2EE;--vdb-ink-muted:#B4B4AE;--vdb-ink-subtle:#6E6E68;--vdb-border:#2A2D33;--vdb-primary:#8BA8E0;--vdb-accent:#E8B088;--vdb-success:#7FBF9B;--vdb-warn:#D0A271;--vdb-alert:#D98579;--vdb-neutral-1:#1F2229;}}
.bg{fill:var(--vdb-bg);}
.title{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:20px;fill:var(--vdb-ink);}
.head{font-family:Inter,system-ui,sans-serif;font-weight:700;font-size:12px;fill:var(--vdb-ink);}
.label{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:11px;fill:var(--vdb-ink-muted);}
.mono{font-family:"JetBrains Mono",ui-monospace,Menlo,monospace;font-weight:500;font-size:13px;fill:var(--vdb-ink);}
.box{fill:var(--vdb-surface);stroke:var(--vdb-border);stroke-width:1.5;}
.box-primary{fill:var(--vdb-primary);stroke:var(--vdb-ink);stroke-width:1.5;}
.box-accent{fill:var(--vdb-accent);stroke:var(--vdb-ink);stroke-width:1.5;}
.box-success{fill:var(--vdb-success);stroke:var(--vdb-ink);stroke-width:1.5;}
.flow{stroke:var(--vdb-ink);stroke-width:1.5;fill:none;}
.flow-muted{stroke:var(--vdb-ink-muted);stroke-width:1;fill:none;stroke-dasharray:4 3;}
.on-fill{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:12px;fill:#FFFFFF;}
.mono-sm{font-family:"JetBrains Mono",ui-monospace,Menlo,monospace;font-weight:500;font-size:9px;fill:var(--vdb-ink);}
.label-sm{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:9px;fill:var(--vdb-ink-muted);}
.head-sm{font-family:Inter,system-ui,sans-serif;font-weight:700;font-size:9px;fill:var(--vdb-ink);}
]]></style>
  <defs>
    <marker id="invArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="var(--vdb-ink)"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect class="bg" x="0" y="0" width="750" height="400"/>

  <!-- Title -->
  <text class="title" x="375" y="30" text-anchor="middle">Inverted Index: Enabling Filter Queries</text>
  <text class="label" x="375" y="48" text-anchor="middle">Map metadata values to document IDs for fast filtering</text>

  <!-- Forward Index (documents) -->
  <rect class="box" x="50" y="70" width="280" height="150" rx="10"/>
  <text class="head" x="190" y="95" text-anchor="middle" font-size="11">Documents (Forward View)</text>

  <!-- Document entries -->
  <rect class="box" x="70" y="110" width="240" height="25" rx="3"/>
  <text class="mono-sm" x="80" y="127">doc_1: {category: "tech", author: "alice"}</text>

  <rect class="box" x="70" y="140" width="240" height="25" rx="3"/>
  <text class="mono-sm" x="80" y="157">doc_2: {category: "tech", author: "bob"}</text>

  <rect class="box" x="70" y="170" width="240" height="25" rx="3"/>
  <text class="mono-sm" x="80" y="187">doc_3: {category: "news", author: "alice"}</text>

  <!-- Arrow -->
  <line class="flow" x1="330" y1="145" x2="378" y2="145" marker-end="url(#invArrow)"/>
  <text class="label-sm" x="355" y="135" text-anchor="middle">invert</text>

  <!-- Inverted Index -->
  <rect class="box" x="390" y="70" width="310" height="150" rx="10" stroke="var(--vdb-primary)"/>
  <text class="head" x="545" y="95" text-anchor="middle" font-size="11">Inverted Index</text>

  <!-- Category index -->
  <rect class="box" x="410" y="110" width="130" height="50" rx="4" stroke="var(--vdb-success)"/>
  <text class="head-sm" x="475" y="125" text-anchor="middle">category</text>
  <text class="mono-sm" x="420" y="145">"tech" → [1, 2]</text>
  <text class="mono-sm" x="420" y="157">"news" → [3]</text>

  <!-- Author index -->
  <rect class="box" x="550" y="110" width="130" height="50" rx="4" stroke="var(--vdb-warn)"/>
  <text class="head-sm" x="615" y="125" text-anchor="middle">author</text>
  <text class="mono-sm" x="560" y="145">"alice" → [1, 3]</text>
  <text class="mono-sm" x="560" y="157">"bob" → [2]</text>

  <text class="label-sm" x="545" y="200" text-anchor="middle">HashMap&lt;String, HashSet&lt;DocId&gt;&gt;</text>

  <!-- Query example -->
  <rect class="box" x="50" y="240" width="650" height="140" rx="10" stroke="var(--vdb-primary)"/>
  <text class="head" x="375" y="268" text-anchor="middle">Filter Query Example</text>

  <!-- Query -->
  <rect class="box" x="80" y="285" width="180" height="40" rx="6" stroke="var(--vdb-primary)"/>
  <text class="head-sm" x="170" y="305" text-anchor="middle">Filter: category="tech"</text>
  <text class="label-sm" x="170" y="318" text-anchor="middle">AND author="alice"</text>

  <line class="flow" x1="260" y1="305" x2="303" y2="305" marker-end="url(#invArrow)"/>

  <!-- Lookup -->
  <rect class="box" x="310" y="285" width="160" height="40" rx="6" stroke="var(--vdb-warn)"/>
  <text class="head-sm" x="390" y="302" text-anchor="middle">Index Lookup</text>
  <text class="mono-sm" x="390" y="315" text-anchor="middle">[1,2] ∩ [1,3] = [1]</text>

  <line class="flow" x1="470" y1="305" x2="513" y2="305" marker-end="url(#invArrow)"/>

  <!-- Result -->
  <rect class="box" x="520" y="285" width="160" height="40" rx="6" stroke="var(--vdb-success)"/>
  <circle cx="552" cy="299" r="4" fill="var(--vdb-success)" stroke="var(--vdb-ink)" stroke-width="0.75"/>
  <text class="head-sm" x="610" y="302" text-anchor="middle">Result: doc_1</text>
  <text class="label-sm" x="600" y="315" text-anchor="middle">O(1) lookup!</text>

  <!-- Benefit -->
  <text class="head" x="375" y="365" text-anchor="middle" font-size="10">Now search ONLY vectors matching filter, not all N vectors!</text>
</svg>
