<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" role="img" aria-labelledby="t d">
  <title id="t">Option&lt;T&gt; vs Null</title>
  <desc id="d">A side-by-side comparison of nullable pointers and Rust's Option&lt;T&gt;. On the left, a C/Java nullable pointer can be NULL for any reference, so calling a method crashes at runtime with a NullPointerException and the compiler cannot catch it. On the right, Rust's Option&lt;T&gt; forces an explicit match on Some and None, so the compiler enforces the null-check at compile time and the crash is impossible.</desc>
  <style><![CDATA[
:root{--vdb-bg:#FAFAF7;--vdb-surface:#FFFFFF;--vdb-ink:#1A1A1A;--vdb-ink-muted:#5C5C5C;--vdb-ink-subtle:#9A9A9A;--vdb-border:#D9D9D4;--vdb-primary:#5B7FBF;--vdb-accent:#D98E5F;--vdb-success:#5C9E78;--vdb-warn:#B8895A;--vdb-alert:#C66B5E;--vdb-neutral-1:#EAEAE4;}
@media (prefers-color-scheme:dark){:root{--vdb-bg:#0E0F12;--vdb-surface:#16181C;--vdb-ink:#F2F2EE;--vdb-ink-muted:#B4B4AE;--vdb-ink-subtle:#6E6E68;--vdb-border:#2A2D33;--vdb-primary:#8BA8E0;--vdb-accent:#E8B088;--vdb-success:#7FBF9B;--vdb-warn:#D0A271;--vdb-alert:#D98579;--vdb-neutral-1:#1F2229;}}
.bg{fill:var(--vdb-bg);}
.title{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:20px;fill:var(--vdb-ink);}
.head{font-family:Inter,system-ui,sans-serif;font-weight:700;font-size:12px;fill:var(--vdb-ink);}
.label{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:11px;fill:var(--vdb-ink-muted);}
.mono{font-family:"JetBrains Mono",ui-monospace,Menlo,monospace;font-weight:500;font-size:13px;fill:var(--vdb-ink);}
.box{fill:var(--vdb-surface);stroke:var(--vdb-border);stroke-width:1.5;}
.box-primary{fill:var(--vdb-primary);stroke:var(--vdb-ink);stroke-width:1.5;}
.box-accent{fill:var(--vdb-accent);stroke:var(--vdb-ink);stroke-width:1.5;}
.box-success{fill:var(--vdb-success);stroke:var(--vdb-ink);stroke-width:1.5;}
.flow{stroke:var(--vdb-ink);stroke-width:1.5;fill:none;}
.flow-muted{stroke:var(--vdb-ink-muted);stroke-width:1;fill:none;stroke-dasharray:4 3;}
.on-fill{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:12px;fill:#FFFFFF;}
.code{font-family:"JetBrains Mono",ui-monospace,Menlo,monospace;font-weight:500;font-size:11px;fill:var(--vdb-ink-muted);}
.code-alert{font-family:"JetBrains Mono",ui-monospace,Menlo,monospace;font-weight:500;font-size:11px;fill:var(--vdb-alert);}
.code-success{font-family:"JetBrains Mono",ui-monospace,Menlo,monospace;font-weight:500;font-size:11px;fill:var(--vdb-success);}
.code-accent{font-family:"JetBrains Mono",ui-monospace,Menlo,monospace;font-weight:500;font-size:11px;fill:var(--vdb-accent);}
.bullet{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:10px;fill:var(--vdb-ink-muted);}
.subhead{font-family:Inter,system-ui,sans-serif;font-weight:700;font-size:10px;fill:var(--vdb-ink);}
]]></style>

  <rect class="bg" x="0" y="0" width="700" height="350"/>

  <!-- Title -->
  <text class="title" x="350" y="28" text-anchor="middle">Option&lt;T&gt; vs Null</text>
  <text class="label" x="350" y="47" text-anchor="middle">Compile-time null safety</text>

  <!-- ===== C/Java NULL section ===== -->
  <rect class="box" x="40" y="65" width="280" height="260" rx="8"/>
  <!-- header strip -->
  <path class="box-accent" d="M40 73 a8 8 0 0 1 8 -8 h264 a8 8 0 0 1 8 8 v22 h-280 z" fill="var(--vdb-alert)"/>
  <!-- status marker: open square (negative) -->
  <rect x="56" y="74" width="12" height="12" rx="2" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="56" y1="74" x2="68" y2="86" stroke="#FFFFFF" stroke-width="1.5"/>
  <text class="on-fill" x="186" y="84" text-anchor="middle">C/Java: Nullable Pointer</text>

  <text class="code" x="60" y="120">User user = getUser(id);</text>
  <text class="code" x="60" y="145">// user might be NULL!</text>
  <text class="code" x="60" y="175">user.getName(); // CRASH</text>
  <text class="code-alert" x="60" y="195">// NullPointerException</text>

  <rect class="box" x="60" y="215" width="240" height="95" rx="6" fill="var(--vdb-neutral-1)"/>
  <text class="subhead" x="180" y="238" text-anchor="middle" fill="var(--vdb-alert)">Problems:</text>
  <circle cx="79" cy="256" r="2" fill="var(--vdb-alert)"/>
  <text class="bullet" x="88" y="260">Null is valid for ANY pointer type</text>
  <circle cx="79" cy="274" r="2" fill="var(--vdb-alert)"/>
  <text class="bullet" x="88" y="278">Compiler can't catch null access</text>
  <circle cx="79" cy="292" r="2" fill="var(--vdb-alert)"/>
  <text class="bullet" x="88" y="296">Runtime crashes in production</text>

  <!-- ===== Rust Option section ===== -->
  <rect class="box" x="380" y="65" width="280" height="260" rx="8"/>
  <!-- header strip -->
  <path class="box-success" d="M380 73 a8 8 0 0 1 8 -8 h264 a8 8 0 0 1 8 8 v22 h-280 z"/>
  <!-- status marker: filled square (positive) -->
  <rect x="396" y="74" width="12" height="12" rx="2" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="1.5"/>
  <text class="on-fill" x="526" y="84" text-anchor="middle">Rust: Option&lt;T&gt;</text>

  <text class="code" x="400" y="120">let user: Option&lt;User&gt; =</text>
  <text class="code" x="400" y="138">    get_user(id);</text>
  <text class="code" x="400" y="168">match user {</text>
  <text class="code-success" x="400" y="186">  Some(u) =&gt; u.name(),</text>
  <text class="code-accent" x="400" y="204">  None =&gt; "Unknown",</text>
  <text class="code" x="400" y="222">}</text>

  <rect class="box" x="400" y="235" width="240" height="75" rx="6" fill="var(--vdb-neutral-1)"/>
  <text class="subhead" x="520" y="258" text-anchor="middle" fill="var(--vdb-success)">Benefits:</text>
  <circle cx="419" cy="274" r="2" fill="var(--vdb-success)"/>
  <text class="bullet" x="428" y="278">Must handle None explicitly</text>
  <circle cx="419" cy="292" r="2" fill="var(--vdb-success)"/>
  <text class="bullet" x="428" y="296">Compiler enforces null-check</text>
</svg>
