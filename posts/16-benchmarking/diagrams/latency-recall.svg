<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 400" role="img" aria-labelledby="t d">
  <title id="t">Benchmarking: Latency vs Recall Trade-off</title>
  <desc id="d">A scatter plot of approximate-nearest-neighbour configurations with Recall@10 on the x-axis and query latency in milliseconds on the y-axis. Brute Force reaches 100% recall at 50ms, while HNSW points (ef=200, ef=100, ef=50, ef=20) trade recall for speed along a curve. The takeaway is that ef=50 is the sweet spot, balancing high recall against low latency, since higher ef means better recall but slower search.</desc>
  <style><![CDATA[
:root{--vdb-bg:#FAFAF7;--vdb-surface:#FFFFFF;--vdb-ink:#1A1A1A;--vdb-ink-muted:#5C5C5C;--vdb-ink-subtle:#9A9A9A;--vdb-border:#D9D9D4;--vdb-primary:#5B7FBF;--vdb-accent:#D98E5F;--vdb-success:#5C9E78;--vdb-warn:#B8895A;--vdb-alert:#C66B5E;--vdb-neutral-1:#EAEAE4;}
@media (prefers-color-scheme:dark){:root{--vdb-bg:#0E0F12;--vdb-surface:#16181C;--vdb-ink:#F2F2EE;--vdb-ink-muted:#B4B4AE;--vdb-ink-subtle:#6E6E68;--vdb-border:#2A2D33;--vdb-primary:#8BA8E0;--vdb-accent:#E8B088;--vdb-success:#7FBF9B;--vdb-warn:#D0A271;--vdb-alert:#D98579;--vdb-neutral-1:#1F2229;}}
.bg{fill:var(--vdb-bg);}
.title{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:20px;fill:var(--vdb-ink);}
.head{font-family:Inter,system-ui,sans-serif;font-weight:700;font-size:12px;fill:var(--vdb-ink);}
.label{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:11px;fill:var(--vdb-ink-muted);}
.mono{font-family:"JetBrains Mono",ui-monospace,Menlo,monospace;font-weight:500;font-size:13px;fill:var(--vdb-ink);}
.box{fill:var(--vdb-surface);stroke:var(--vdb-border);stroke-width:1.5;}
.box-primary{fill:var(--vdb-primary);stroke:var(--vdb-ink);stroke-width:1.5;}
.box-accent{fill:var(--vdb-accent);stroke:var(--vdb-ink);stroke-width:1.5;}
.box-success{fill:var(--vdb-success);stroke:var(--vdb-ink);stroke-width:1.5;}
.flow{stroke:var(--vdb-ink);stroke-width:1.5;fill:none;}
.flow-muted{stroke:var(--vdb-ink-muted);stroke-width:1;fill:none;stroke-dasharray:4 3;}
.on-fill{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:12px;fill:#FFFFFF;}
.axis{stroke:var(--vdb-ink-muted);stroke-width:1.5;fill:none;}
.tick{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:8px;fill:var(--vdb-ink-subtle);}
.axis-label{font-family:Inter,system-ui,sans-serif;font-weight:700;font-size:11px;fill:var(--vdb-ink);}
.pt-label{font-family:Inter,system-ui,sans-serif;font-weight:700;font-size:9px;fill:var(--vdb-ink);}
.pt-sub{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:7px;fill:var(--vdb-ink-muted);}
.dot{stroke:var(--vdb-surface);stroke-width:1.5;}
]]></style>

  <rect class="bg" x="0" y="0" width="750" height="400"/>

  <!-- Title -->
  <text x="375" y="28" text-anchor="middle" class="title">Benchmarking: Latency vs Recall Trade-off</text>
  <text x="375" y="48" text-anchor="middle" class="label">Finding the sweet spot for your use case</text>

  <!-- Chart area -->
  <rect class="box" x="100" y="70" width="550" height="250" rx="8"/>

  <!-- Y-axis (Latency) -->
  <line x1="100" y1="70" x2="100" y2="320" class="axis"/>
  <text x="60" y="200" text-anchor="middle" class="axis-label" transform="rotate(-90 60 200)">Latency (ms)</text>

  <text x="90" y="90" text-anchor="end" class="tick">100</text>
  <text x="90" y="145" text-anchor="end" class="tick">50</text>
  <text x="90" y="200" text-anchor="end" class="tick">10</text>
  <text x="90" y="255" text-anchor="end" class="tick">5</text>
  <text x="90" y="310" text-anchor="end" class="tick">1</text>

  <!-- X-axis (Recall) -->
  <line x1="100" y1="320" x2="650" y2="320" class="axis"/>
  <text x="375" y="355" text-anchor="middle" class="axis-label">Recall@10</text>

  <text x="120" y="335" class="tick">0.80</text>
  <text x="230" y="335" class="tick">0.85</text>
  <text x="340" y="335" class="tick">0.90</text>
  <text x="450" y="335" class="tick">0.95</text>
  <text x="560" y="335" class="tick">0.99</text>
  <text x="630" y="335" class="tick">1.00</text>

  <!-- Trade-off curve -->
  <path d="M120 280 Q 200 260, 280 250 Q 380 235, 450 200 Q 520 150, 580 100 Q 620 70, 640 60"
        class="flow"/>

  <!-- Data points -->
  <!-- Brute Force (high recall, high latency) -->
  <circle cx="640" cy="85" r="8" class="dot" fill="var(--vdb-alert)"/>
  <text x="626" y="82" text-anchor="end" class="pt-label">Brute Force</text>
  <text x="626" y="96" text-anchor="end" class="pt-sub">100% recall, 50ms</text>

  <!-- HNSW ef=200 -->
  <circle cx="580" cy="115" r="8" class="dot" fill="var(--vdb-accent)"/>
  <text x="560" y="135" text-anchor="end" class="pt-label">ef=200</text>

  <!-- HNSW ef=100 -->
  <circle cx="450" cy="190" r="8" class="dot" fill="var(--vdb-success)"/>
  <text x="430" y="210" text-anchor="end" class="pt-label">ef=100</text>

  <!-- HNSW ef=50 (sweet spot) -->
  <circle cx="340" cy="235" r="12" fill="var(--vdb-success)" stroke="var(--vdb-ink)" stroke-width="1.5"/>
  <!-- drawn star marker (replaces emoji) -->
  <path d="M340 230 l1.8 3.6 4 0.6 -2.9 2.8 0.7 4 -3.6 -1.9 -3.6 1.9 0.7 -4 -2.9 -2.8 4 -0.6 z" fill="#FFFFFF" stroke="var(--vdb-ink)" stroke-width="0.75"/>
  <text x="360" y="230" class="pt-label">ef=50</text>
  <text x="360" y="244" class="pt-sub">Sweet spot!</text>

  <!-- HNSW ef=20 -->
  <circle cx="200" cy="265" r="8" class="dot" fill="var(--vdb-primary)"/>
  <text x="220" y="280" class="pt-label">ef=20</text>

  <!-- Legend -->
  <rect class="box" x="100" y="365" width="550" height="25" rx="4"/>
  <text x="180" y="382" class="label">ef = HNSW search effort parameter</text>
  <text x="420" y="382" class="label">Higher ef = better recall, slower search</text>
</svg>
