<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" role="img" aria-labelledby="t d">
  <title id="t">Query Planner: Strategy Selection</title>
  <desc id="d">A cost-based query optimizer receives an incoming vector query with filters and a top_k, estimates filter selectivity, and routes execution to one of three strategies. High selectivity (greater than 50 percent) uses Vector-First, medium selectivity (1 to 50 percent) uses Bitmask-HNSW, and low selectivity (less than 1 percent) uses Filter-First. The takeaway is that choosing the cheapest path by selectivity minimizes query cost.</desc>
  <style><![CDATA[
:root{--vdb-bg:#FAFAF7;--vdb-surface:#FFFFFF;--vdb-ink:#1A1A1A;--vdb-ink-muted:#5C5C5C;--vdb-ink-subtle:#9A9A9A;--vdb-border:#D9D9D4;--vdb-primary:#5B7FBF;--vdb-accent:#D98E5F;--vdb-success:#5C9E78;--vdb-warn:#B8895A;--vdb-alert:#C66B5E;--vdb-neutral-1:#EAEAE4;}
@media (prefers-color-scheme:dark){:root{--vdb-bg:#0E0F12;--vdb-surface:#16181C;--vdb-ink:#F2F2EE;--vdb-ink-muted:#B4B4AE;--vdb-ink-subtle:#6E6E68;--vdb-border:#2A2D33;--vdb-primary:#8BA8E0;--vdb-accent:#E8B088;--vdb-success:#7FBF9B;--vdb-warn:#D0A271;--vdb-alert:#D98579;--vdb-neutral-1:#1F2229;}}
.bg{fill:var(--vdb-bg);}
.title{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:20px;fill:var(--vdb-ink);}
.head{font-family:Inter,system-ui,sans-serif;font-weight:700;font-size:12px;fill:var(--vdb-ink);}
.label{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:11px;fill:var(--vdb-ink-muted);}
.mono{font-family:"JetBrains Mono",ui-monospace,Menlo,monospace;font-weight:500;font-size:13px;fill:var(--vdb-ink);}
.box{fill:var(--vdb-surface);stroke:var(--vdb-border);stroke-width:1.5;}
.box-primary{fill:var(--vdb-primary);stroke:var(--vdb-ink);stroke-width:1.5;}
.box-accent{fill:var(--vdb-accent);stroke:var(--vdb-ink);stroke-width:1.5;}
.box-success{fill:var(--vdb-success);stroke:var(--vdb-ink);stroke-width:1.5;}
.flow{stroke:var(--vdb-ink);stroke-width:1.5;fill:none;}
.flow-muted{stroke:var(--vdb-ink-muted);stroke-width:1;fill:none;stroke-dasharray:4 3;}
.on-fill{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:12px;fill:#FFFFFF;}
.sub{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:9px;fill:var(--vdb-ink-subtle);}
.sel{font-family:Inter,system-ui,sans-serif;font-weight:700;font-size:9px;}
.step{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:10px;fill:var(--vdb-ink);}
.eg{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:9px;}
.warn-fill{fill:var(--vdb-warn);stroke:var(--vdb-ink);stroke-width:1.5;}
]]></style>

  <!-- Background -->
  <rect class="bg" x="0" y="0" width="800" height="460"/>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="var(--vdb-ink)"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Query Planner: Strategy Selection</text>
  <text x="400" y="50" text-anchor="middle" class="label">Cost-based optimizer chooses the best execution path based on filter selectivity</text>

  <!-- Query Input -->
  <rect class="box" x="280" y="70" width="240" height="50" rx="8"/>
  <text x="400" y="92" text-anchor="middle" class="label" fill="var(--vdb-ink)">Incoming Query</text>
  <text x="400" y="108" text-anchor="middle" class="sub">vector + filters + top_k</text>

  <!-- Arrow down to planner -->
  <line x1="400" y1="120" x2="400" y2="145" class="flow" marker-end="url(#arrow)"/>

  <!-- Query Planner -->
  <rect class="warn-fill" x="250" y="150" width="300" height="60" rx="8"/>
  <text x="400" y="174" text-anchor="middle" class="on-fill">Query Planner (Cost Estimator)</text>
  <text x="400" y="195" text-anchor="middle" class="on-fill" font-weight="400" font-size="10">Estimates selectivity, picks cheapest strategy</text>

  <!-- Three strategy arrows -->
  <line x1="300" y1="210" x2="130" y2="260" class="flow" marker-end="url(#arrow)"/>
  <line x1="400" y1="210" x2="400" y2="260" class="flow" marker-end="url(#arrow)"/>
  <line x1="500" y1="210" x2="670" y2="260" class="flow" marker-end="url(#arrow)"/>

  <!-- Selectivity labels on arrows -->
  <text x="195" y="238" text-anchor="middle" class="sel" fill="var(--vdb-primary)">high sel. (&gt;50%)</text>
  <text x="400" y="250" text-anchor="middle" class="sel" fill="var(--vdb-accent)">medium (1-50%)</text>
  <text x="605" y="238" text-anchor="middle" class="sel" fill="var(--vdb-success)">low sel. (&lt;1%)</text>

  <!-- Strategy 1: Vector-First -->
  <rect class="box" x="30" y="265" width="220" height="170" rx="8"/>
  <rect class="box-primary" x="30" y="265" width="220" height="26" rx="8"/>
  <rect class="box-primary" x="30" y="278" width="220" height="13" stroke="none"/>
  <line x1="30" y1="291" x2="250" y2="291" class="flow"/>
  <text x="50" y="284" class="on-fill">Strategy 1: Vector-First</text>

  <text x="140" y="312" text-anchor="middle" class="step">1. HNSW search (all vectors)</text>
  <text x="140" y="330" text-anchor="middle" class="step">2. Post-filter results</text>
  <text x="140" y="350" text-anchor="middle" class="sub">Best when most vectors</text>
  <text x="140" y="363" text-anchor="middle" class="sub">pass the filter</text>

  <rect x="55" y="378" width="170" height="25" rx="4" fill="var(--vdb-neutral-1)" stroke="var(--vdb-primary)" stroke-width="1"/>
  <text x="140" y="395" text-anchor="middle" class="sub" fill="var(--vdb-ink-muted)">Cost: O(log N) + filter</text>

  <text x="140" y="425" text-anchor="middle" class="eg" fill="var(--vdb-primary)">e.g. "year &gt; 2000" (90% match)</text>

  <!-- Strategy 2: Hybrid -->
  <rect class="box" x="280" y="265" width="240" height="170" rx="8"/>
  <rect class="box-accent" x="280" y="265" width="240" height="26" rx="8"/>
  <rect class="box-accent" x="280" y="278" width="240" height="13" stroke="none"/>
  <line x1="280" y1="291" x2="520" y2="291" class="flow"/>
  <text x="300" y="284" class="on-fill">Strategy 2: Bitmask-HNSW</text>

  <text x="400" y="312" text-anchor="middle" class="step">1. Build allow-list bitmask</text>
  <text x="400" y="330" text-anchor="middle" class="step">2. Filtered HNSW traversal</text>
  <text x="400" y="350" text-anchor="middle" class="sub">Best for moderate selectivity</text>
  <text x="400" y="363" text-anchor="middle" class="sub">Graph still navigable</text>

  <rect x="310" y="378" width="180" height="25" rx="4" fill="var(--vdb-neutral-1)" stroke="var(--vdb-accent)" stroke-width="1"/>
  <text x="400" y="395" text-anchor="middle" class="sub" fill="var(--vdb-ink-muted)">Cost: O(log N &#215; 1/sel)</text>

  <text x="400" y="425" text-anchor="middle" class="eg" fill="var(--vdb-accent)">e.g. "category=tech" (15%)</text>

  <!-- Strategy 3: Filter-First -->
  <rect class="box" x="550" y="265" width="220" height="170" rx="8"/>
  <rect class="box-success" x="550" y="265" width="220" height="26" rx="8"/>
  <rect class="box-success" x="550" y="278" width="220" height="13" stroke="none"/>
  <line x1="550" y1="291" x2="770" y2="291" class="flow"/>
  <text x="570" y="284" class="on-fill">Strategy 3: Filter-First</text>

  <text x="660" y="312" text-anchor="middle" class="step">1. Tantivy metadata query</text>
  <text x="660" y="330" text-anchor="middle" class="step">2. Brute-force on survivors</text>
  <text x="660" y="350" text-anchor="middle" class="sub">Best when very few vectors</text>
  <text x="660" y="363" text-anchor="middle" class="sub">pass the filter</text>

  <rect x="575" y="378" width="170" height="25" rx="4" fill="var(--vdb-neutral-1)" stroke="var(--vdb-success)" stroke-width="1"/>
  <text x="660" y="395" text-anchor="middle" class="sub" fill="var(--vdb-ink-muted)">Cost: O(F) brute force</text>

  <text x="660" y="425" text-anchor="middle" class="eg" fill="var(--vdb-success)">e.g. "author=Smith" (0.1%)</text>
</svg>
