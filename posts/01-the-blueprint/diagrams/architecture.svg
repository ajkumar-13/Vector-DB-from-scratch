<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 578" role="img" aria-labelledby="t d">
  <title id="t">VectorDB Three-Layer Architecture</title>
  <desc id="d">A block diagram of a single-node persistent vector database. A client HTTP request flows top to bottom through three stacked layers: the Transport layer (Axum, JSON Parser, Validation), the Core Engine (Query Planner, Vector Index, Metadata Index), and the Storage layer (Write-Ahead Log and Segments), finally landing on persistent disk storage. The takeaway is that each layer has a single clear responsibility, separating request handling from search logic from durable persistence.</desc>
  <style><![CDATA[
:root{--vdb-bg:#FAFAF7;--vdb-surface:#FFFFFF;--vdb-ink:#1A1A1A;--vdb-ink-muted:#5C5C5C;--vdb-ink-subtle:#9A9A9A;--vdb-border:#D9D9D4;--vdb-primary:#5B7FBF;--vdb-accent:#D98E5F;--vdb-success:#5C9E78;--vdb-warn:#B8895A;--vdb-alert:#C66B5E;--vdb-neutral-1:#EAEAE4;}
@media (prefers-color-scheme:dark){:root{--vdb-bg:#0E0F12;--vdb-surface:#16181C;--vdb-ink:#F2F2EE;--vdb-ink-muted:#B4B4AE;--vdb-ink-subtle:#6E6E68;--vdb-border:#2A2D33;--vdb-primary:#8BA8E0;--vdb-accent:#E8B088;--vdb-success:#7FBF9B;--vdb-warn:#D0A271;--vdb-alert:#D98579;--vdb-neutral-1:#1F2229;}}
.bg{fill:var(--vdb-bg);}
.title{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:20px;fill:var(--vdb-ink);}
.head{font-family:Inter,system-ui,sans-serif;font-weight:700;font-size:12px;fill:var(--vdb-ink);}
.label{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:11px;fill:var(--vdb-ink-muted);}
.mono{font-family:"JetBrains Mono",ui-monospace,Menlo,monospace;font-weight:500;font-size:13px;fill:var(--vdb-ink);}
.box{fill:var(--vdb-surface);stroke:var(--vdb-border);stroke-width:1.5;}
.box-primary{fill:var(--vdb-primary);stroke:var(--vdb-ink);stroke-width:1.5;}
.box-accent{fill:var(--vdb-accent);stroke:var(--vdb-ink);stroke-width:1.5;}
.box-success{fill:var(--vdb-success);stroke:var(--vdb-ink);stroke-width:1.5;}
.flow{stroke:var(--vdb-ink);stroke-width:1.5;fill:none;}
.flow-muted{stroke:var(--vdb-ink-muted);stroke-width:1;fill:none;stroke-dasharray:4 3;}
.on-fill{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:12px;fill:#FFFFFF;}
.sub{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:9px;fill:var(--vdb-ink-subtle);}
.layer-frame{fill:none;stroke:var(--vdb-border);stroke-width:1.5;}
.inner{fill:var(--vdb-neutral-1);stroke:var(--vdb-border);stroke-width:1;}
]]></style>

  <rect class="bg" x="0" y="0" width="800" height="578"/>

  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="var(--vdb-ink)"/>
    </marker>
  </defs>

  <!-- Title -->
  <text class="title" x="400" y="32" text-anchor="middle">VectorDB Architecture</text>
  <text class="label" x="400" y="52" text-anchor="middle">Three-Layer Design: Transport &#8594; Engine &#8594; Storage</text>

  <!-- Client Box -->
  <rect class="box" x="320" y="72" width="160" height="46" rx="8"/>
  <text class="head" x="400" y="92" text-anchor="middle">Client</text>
  <text class="label" x="400" y="108" text-anchor="middle">HTTP Request (curl/SDK)</text>

  <!-- Arrow to Transport -->
  <line class="flow" x1="400" y1="118" x2="400" y2="146" marker-end="url(#arrow)"/>

  <!-- LAYER 1: Transport Layer -->
  <rect class="layer-frame" x="100" y="150" width="600" height="98" rx="10"/>
  <rect class="box-primary" x="100" y="150" width="600" height="28" rx="10"/>

  <text class="on-fill" x="118" y="169" font-weight="700">LAYER 1: TRANSPORT (The Doorman)</text>

  <!-- Transport Components -->
  <rect class="inner" x="130" y="196" width="130" height="42" rx="6"/>
  <text class="head" x="195" y="216" text-anchor="middle">Axum</text>
  <text class="label" x="195" y="230" text-anchor="middle">Web Framework</text>

  <text class="label" x="285" y="222" font-size="16" fill="var(--vdb-ink-muted)">&#8594;</text>

  <rect class="inner" x="310" y="196" width="130" height="42" rx="6"/>
  <text class="head" x="375" y="216" text-anchor="middle">JSON Parser</text>
  <text class="label" x="375" y="230" text-anchor="middle">serde_json</text>

  <text class="label" x="465" y="222" font-size="16" fill="var(--vdb-ink-muted)">&#8594;</text>

  <rect class="inner" x="490" y="196" width="130" height="42" rx="6"/>
  <text class="head" x="555" y="216" text-anchor="middle">Validation</text>
  <text class="label" x="555" y="230" text-anchor="middle">Auth + Schema</text>

  <!-- Arrow to Engine -->
  <line class="flow" x1="400" y1="248" x2="400" y2="273" marker-end="url(#arrow)"/>

  <!-- LAYER 2: Core Engine -->
  <rect class="layer-frame" x="100" y="277" width="600" height="112" rx="10"/>
  <rect class="box-accent" x="100" y="277" width="600" height="28" rx="10"/>

  <text class="on-fill" x="118" y="296" font-weight="700">LAYER 2: CORE ENGINE (The Brain)</text>

  <!-- Engine Components -->
  <rect class="inner" x="130" y="322" width="160" height="56" rx="6"/>
  <text class="head" x="210" y="343" text-anchor="middle">Query Planner</text>
  <text class="label" x="210" y="358" text-anchor="middle">Optimizer</text>
  <text class="sub" x="210" y="371" text-anchor="middle">Vector-first vs Filter-first</text>

  <rect class="inner" x="320" y="322" width="160" height="56" rx="6"/>
  <text class="head" x="400" y="343" text-anchor="middle">Vector Index</text>
  <text class="label" x="400" y="358" text-anchor="middle">HNSW Graph</text>
  <text class="sub" x="400" y="371" text-anchor="middle">Approximate NN Search</text>

  <rect class="inner" x="510" y="322" width="160" height="56" rx="6"/>
  <text class="head" x="590" y="343" text-anchor="middle">Metadata Index</text>
  <text class="label" x="590" y="358" text-anchor="middle">Tantivy</text>
  <text class="sub" x="590" y="371" text-anchor="middle">Filter by attributes</text>

  <!-- Arrow to Storage -->
  <line class="flow" x1="400" y1="389" x2="400" y2="414" marker-end="url(#arrow)"/>

  <!-- LAYER 3: Storage Layer -->
  <rect class="layer-frame" x="100" y="418" width="600" height="98" rx="10"/>
  <rect class="box-success" x="100" y="418" width="600" height="28" rx="10"/>

  <text class="on-fill" x="118" y="437" font-weight="700">LAYER 3: STORAGE (The Vault)</text>

  <!-- Storage Components -->
  <rect class="inner" x="200" y="464" width="170" height="42" rx="6"/>
  <text class="head" x="285" y="484" text-anchor="middle">Write-Ahead Log</text>
  <text class="label" x="285" y="498" text-anchor="middle">Append-Only (Durability)</text>

  <text class="label" x="395" y="490" font-size="16" fill="var(--vdb-ink-muted)">&#8594;</text>

  <rect class="inner" x="430" y="464" width="170" height="42" rx="6"/>
  <text class="head" x="515" y="484" text-anchor="middle">Segments</text>
  <text class="label" x="515" y="498" text-anchor="middle">Memory-Mapped Files</text>

  <!-- Arrow to Disk -->
  <line class="flow" x1="400" y1="516" x2="400" y2="538" marker-end="url(#arrow)"/>

  <!-- Disk -->
  <rect class="box" x="300" y="538" width="14" height="10" rx="2"/>
  <text class="label" x="324" y="547">Persistent Disk Storage</text>
</svg>
