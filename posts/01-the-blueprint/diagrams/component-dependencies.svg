<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="t d">
  <title id="t">Component Dependencies</title>
  <desc id="d">Two columns map how external Rust crates (tokio, axum, serde, tantivy, memmap2, parking_lot) feed into the database components we will build (HNSW Index, WAL, Query Engine, and REST API). Arrows show each crate flowing into the subsystem that relies on it, with the Query Engine orchestrating HNSW and WAL and the REST API sitting at the top of the stack. The takeaway: battle-tested libraries handle the solved 80% so the build can focus on the parts that make a vector database unique.</desc>
  <style><![CDATA[
:root{--vdb-bg:#FAFAF7;--vdb-surface:#FFFFFF;--vdb-ink:#1A1A1A;--vdb-ink-muted:#5C5C5C;--vdb-ink-subtle:#9A9A9A;--vdb-border:#D9D9D4;--vdb-primary:#5B7FBF;--vdb-accent:#D98E5F;--vdb-success:#5C9E78;--vdb-warn:#B8895A;--vdb-alert:#C66B5E;--vdb-neutral-1:#EAEAE4;}
@media (prefers-color-scheme:dark){:root{--vdb-bg:#0E0F12;--vdb-surface:#16181C;--vdb-ink:#F2F2EE;--vdb-ink-muted:#B4B4AE;--vdb-ink-subtle:#6E6E68;--vdb-border:#2A2D33;--vdb-primary:#8BA8E0;--vdb-accent:#E8B088;--vdb-success:#7FBF9B;--vdb-warn:#D0A271;--vdb-alert:#D98579;--vdb-neutral-1:#1F2229;}}
.bg{fill:var(--vdb-bg);}
.title{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:20px;fill:var(--vdb-ink);}
.head{font-family:Inter,system-ui,sans-serif;font-weight:700;font-size:12px;fill:var(--vdb-ink);}
.label{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:11px;fill:var(--vdb-ink-muted);}
.mono{font-family:"JetBrains Mono",ui-monospace,Menlo,monospace;font-weight:500;font-size:13px;fill:var(--vdb-ink);}
.box{fill:var(--vdb-surface);stroke:var(--vdb-border);stroke-width:1.5;}
.box-primary{fill:var(--vdb-primary);stroke:var(--vdb-ink);stroke-width:1.5;}
.box-accent{fill:var(--vdb-accent);stroke:var(--vdb-ink);stroke-width:1.5;}
.box-success{fill:var(--vdb-success);stroke:var(--vdb-ink);stroke-width:1.5;}
.flow{stroke:var(--vdb-ink);stroke-width:1.5;fill:none;}
.flow-muted{stroke:var(--vdb-ink-muted);stroke-width:1;fill:none;stroke-dasharray:4 3;}
.on-fill{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:12px;fill:#FFFFFF;}
.sub{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:9px;fill:var(--vdb-ink-subtle);}
.panel{fill:var(--vdb-surface);stroke:var(--vdb-border);stroke-width:1.5;}
.crate{fill:var(--vdb-neutral-1);stroke:var(--vdb-accent);stroke-width:1;}
.built{fill:var(--vdb-surface);stroke:var(--vdb-primary);stroke-width:1.5;}
.crate-name{font-family:"JetBrains Mono",ui-monospace,Menlo,monospace;font-weight:600;font-size:12px;fill:var(--vdb-ink);}
.built-name{font-family:Inter,system-ui,sans-serif;font-weight:700;font-size:12px;fill:var(--vdb-ink);}
  ]]></style>

  <rect class="bg" x="0" y="0" width="800" height="500"/>

  <defs>
    <marker id="depArrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="var(--vdb-ink-muted)"/>
    </marker>
  </defs>

  <!-- Title -->
  <text class="title" x="400" y="30" text-anchor="middle">Component Dependencies</text>
  <text class="label" x="400" y="50" text-anchor="middle">External Crates (Rust Libraries) &#8594; What We'll Build</text>

  <!-- Left Section: Rust Crates -->
  <rect class="panel" x="40" y="70" width="330" height="400" rx="12"/>
  <text class="head" x="60" y="92" text-anchor="start">Rust Crates We'll Use</text>
  <line class="flow" x1="60" y1="102" x2="350" y2="102" stroke="var(--vdb-accent)"/>

  <!-- Tokio -->
  <rect class="crate" x="60" y="120" width="130" height="65" rx="8"/>
  <text class="crate-name" x="125" y="143" text-anchor="middle">tokio</text>
  <text class="label" x="125" y="161" text-anchor="middle">Async Runtime</text>
  <text class="sub" x="125" y="176" text-anchor="middle">&#8776; asyncio (Python)</text>

  <!-- Axum -->
  <rect class="crate" x="220" y="120" width="130" height="65" rx="8"/>
  <text class="crate-name" x="285" y="143" text-anchor="middle">axum</text>
  <text class="label" x="285" y="161" text-anchor="middle">Web Framework</text>
  <text class="sub" x="285" y="176" text-anchor="middle">&#8776; Flask/FastAPI</text>

  <!-- Arrow: tokio -> axum -->
  <line class="flow" x1="190" y1="152" x2="216" y2="152" marker-end="url(#depArrow)" stroke="var(--vdb-ink-muted)"/>

  <!-- Serde -->
  <rect class="crate" x="60" y="210" width="130" height="65" rx="8"/>
  <text class="crate-name" x="125" y="233" text-anchor="middle">serde</text>
  <text class="label" x="125" y="251" text-anchor="middle">Serialization</text>
  <text class="sub" x="125" y="266" text-anchor="middle">JSON/Binary parsing</text>

  <!-- Tantivy -->
  <rect class="crate" x="220" y="210" width="130" height="65" rx="8"/>
  <text class="crate-name" x="285" y="233" text-anchor="middle">tantivy</text>
  <text class="label" x="285" y="251" text-anchor="middle">Search Engine</text>
  <text class="sub" x="285" y="266" text-anchor="middle">&#8776; Elasticsearch</text>

  <!-- Memmap2 -->
  <rect class="crate" x="140" y="300" width="130" height="65" rx="8"/>
  <text class="crate-name" x="205" y="323" text-anchor="middle">memmap2</text>
  <text class="label" x="205" y="341" text-anchor="middle">Memory Mapping</text>
  <text class="sub" x="205" y="356" text-anchor="middle">Zero-copy file I/O</text>

  <!-- Parking Lot -->
  <rect class="crate" x="140" y="385" width="130" height="65" rx="8"/>
  <text class="crate-name" x="205" y="408" text-anchor="middle">parking_lot</text>
  <text class="label" x="205" y="426" text-anchor="middle">Fast Locks</text>
  <text class="sub" x="205" y="441" text-anchor="middle">Mutex, RwLock</text>

  <!-- Right Section: What We'll Build -->
  <rect class="panel" x="430" y="70" width="330" height="400" rx="12"/>
  <text class="head" x="450" y="92" text-anchor="start">What We'll Build</text>
  <line class="flow" x1="450" y1="102" x2="740" y2="102" stroke="var(--vdb-primary)"/>

  <!-- HNSW Index -->
  <rect class="built" x="450" y="120" width="140" height="70" rx="8"/>
  <text class="built-name" x="520" y="143" text-anchor="middle">HNSW Index</text>
  <text class="label" x="520" y="161" text-anchor="middle">Vector Search</text>
  <text class="sub" x="520" y="178" text-anchor="middle">Posts #13-15</text>

  <!-- WAL -->
  <rect class="built" x="610" y="120" width="140" height="70" rx="8"/>
  <text class="built-name" x="680" y="143" text-anchor="middle">WAL</text>
  <text class="label" x="680" y="161" text-anchor="middle">Durability</text>
  <text class="sub" x="680" y="178" text-anchor="middle">Posts #8-9</text>

  <!-- Query Engine -->
  <rect class="built" x="530" y="220" width="160" height="70" rx="8"/>
  <text class="built-name" x="610" y="243" text-anchor="middle">Query Engine</text>
  <text class="label" x="610" y="261" text-anchor="middle">Orchestration</text>
  <text class="sub" x="610" y="278" text-anchor="middle">Post #19</text>

  <!-- REST API -->
  <rect x="530" y="320" width="160" height="70" rx="8" class="box-success"/>
  <text class="on-fill" x="610" y="345" text-anchor="middle">REST API</text>
  <text class="on-fill" x="610" y="363" text-anchor="middle" font-weight="400" font-size="11">Interface</text>
  <text class="on-fill" x="610" y="380" text-anchor="middle" font-weight="400" font-size="9">Post #5</text>

  <!-- Dependency Arrows -->
  <!-- axum -> API -->
  <path class="flow-muted" d="M350 152 C 400 152, 400 355, 528 355" marker-end="url(#depArrow)"/>

  <!-- serde -> API -->
  <path class="flow-muted" d="M190 242 C 250 242, 430 330, 528 340" marker-end="url(#depArrow)"/>

  <!-- serde -> WAL -->
  <path class="flow-muted" d="M190 220 Q 380 150, 608 145" marker-end="url(#depArrow)"/>

  <!-- memmap -> WAL -->
  <path class="flow-muted" d="M270 332 Q 440 250, 608 160" marker-end="url(#depArrow)"/>

  <!-- memmap -> HNSW -->
  <path class="flow-muted" d="M270 315 Q 380 200, 448 152" marker-end="url(#depArrow)"/>

  <!-- tantivy -> Engine -->
  <path class="flow-muted" d="M350 242 Q 450 242, 528 255" marker-end="url(#depArrow)"/>

  <!-- HNSW -> Engine -->
  <line class="flow-muted" x1="520" y1="190" x2="555" y2="218" marker-end="url(#depArrow)"/>

  <!-- WAL -> Engine -->
  <line class="flow-muted" x1="680" y1="190" x2="665" y2="218" marker-end="url(#depArrow)"/>

  <!-- Engine -> API -->
  <line class="flow-muted" x1="610" y1="290" x2="610" y2="318" marker-end="url(#depArrow)"/>
</svg>
