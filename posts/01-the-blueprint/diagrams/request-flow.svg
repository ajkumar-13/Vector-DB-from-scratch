<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 500" role="img" aria-labelledby="t d">
  <title id="t">Search Request Flow</title>
  <desc id="d">A swimlane sequence diagram tracing a POST /collections/{name}/search request across four actors: Client, Transport, Engine, and Storage. The client sends a request, the transport parses JSON and forwards it, the engine plans a query and chooses a strategy (here vector-first), then queries the storage layer's HNSW and Filter indexes before results flow back as a JSON response. The takeaway: every search is orchestrated by the Engine, which picks an execution strategy and coordinates the indexes before returning the top K results.</desc>
  <style><![CDATA[
:root{--vdb-bg:#FAFAF7;--vdb-surface:#FFFFFF;--vdb-ink:#1A1A1A;--vdb-ink-muted:#5C5C5C;--vdb-ink-subtle:#9A9A9A;--vdb-border:#D9D9D4;--vdb-primary:#5B7FBF;--vdb-accent:#D98E5F;--vdb-success:#5C9E78;--vdb-warn:#B8895A;--vdb-alert:#C66B5E;--vdb-neutral-1:#EAEAE4;}
@media (prefers-color-scheme:dark){:root{--vdb-bg:#0E0F12;--vdb-surface:#16181C;--vdb-ink:#F2F2EE;--vdb-ink-muted:#B4B4AE;--vdb-ink-subtle:#6E6E68;--vdb-border:#2A2D33;--vdb-primary:#8BA8E0;--vdb-accent:#E8B088;--vdb-success:#7FBF9B;--vdb-warn:#D0A271;--vdb-alert:#D98579;--vdb-neutral-1:#1F2229;}}
.bg{fill:var(--vdb-bg);}
.title{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:20px;fill:var(--vdb-ink);}
.head{font-family:Inter,system-ui,sans-serif;font-weight:700;font-size:12px;fill:var(--vdb-ink);}
.label{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:11px;fill:var(--vdb-ink-muted);}
.mono{font-family:"JetBrains Mono",ui-monospace,Menlo,monospace;font-weight:500;font-size:13px;fill:var(--vdb-ink);}
.box{fill:var(--vdb-surface);stroke:var(--vdb-border);stroke-width:1.5;}
.box-primary{fill:var(--vdb-primary);stroke:var(--vdb-ink);stroke-width:1.5;}
.box-accent{fill:var(--vdb-accent);stroke:var(--vdb-ink);stroke-width:1.5;}
.box-success{fill:var(--vdb-success);stroke:var(--vdb-ink);stroke-width:1.5;}
.flow{stroke:var(--vdb-ink);stroke-width:1.5;fill:none;}
.flow-muted{stroke:var(--vdb-ink-muted);stroke-width:1;fill:none;stroke-dasharray:4 3;}
.on-fill{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:12px;fill:#FFFFFF;}
.mono-sm{font-family:"JetBrains Mono",ui-monospace,Menlo,monospace;font-weight:500;font-size:9px;}
.label-sm{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:9px;fill:var(--vdb-ink-muted);}
.head-sm{font-family:Inter,system-ui,sans-serif;font-weight:700;font-size:11px;fill:var(--vdb-ink);}
.lane{stroke:var(--vdb-border);stroke-width:1;stroke-dasharray:4 4;}
.step-num{font-family:Inter,system-ui,sans-serif;font-weight:700;font-size:10px;fill:#FFFFFF;}
.flow-return{stroke:var(--vdb-success);stroke-width:1.5;fill:none;stroke-dasharray:4 2;}
]]></style>

  <rect class="bg" x="0" y="0" width="850" height="500"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowRight" markerWidth="10" markerHeight="10" refX="8.5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="var(--vdb-ink)"/>
    </marker>
    <marker id="arrowLeft" markerWidth="10" markerHeight="10" refX="0.5" refY="3" orient="auto">
      <path d="M9,0 L9,6 L0,3 z" fill="var(--vdb-success)"/>
    </marker>
  </defs>

  <!-- Title -->
  <text class="title" x="425" y="30" text-anchor="middle">Search Request Flow</text>
  <text class="mono" x="425" y="50" text-anchor="middle" font-size="11" fill="var(--vdb-ink-muted)">POST /collections/{name}/search</text>

  <!-- Actor lanes -->
  <!-- Client -->
  <rect class="box-primary" x="60" y="70" width="100" height="40" rx="8"/>
  <text class="on-fill" x="110" y="95" text-anchor="middle">Client</text>
  <line class="lane" x1="110" y1="110" x2="110" y2="470"/>

  <!-- Transport -->
  <rect class="box-primary" x="235" y="70" width="100" height="40" rx="8"/>
  <text class="on-fill" x="285" y="95" text-anchor="middle">Transport</text>
  <line class="lane" x1="285" y1="110" x2="285" y2="470"/>

  <!-- Engine -->
  <rect class="box-accent" x="410" y="70" width="100" height="40" rx="8"/>
  <text class="on-fill" x="460" y="95" text-anchor="middle">Engine</text>
  <line class="lane" x1="460" y1="110" x2="460" y2="470"/>

  <!-- Storage -->
  <rect class="box-success" x="585" y="70" width="100" height="40" rx="8"/>
  <text class="on-fill" x="635" y="95" text-anchor="middle">Storage</text>
  <line class="lane" x1="635" y1="110" x2="635" y2="470"/>

  <!-- Step 1: Client sends request -->
  <line class="flow" x1="122" y1="140" x2="271" y2="140" marker-end="url(#arrowRight)"/>
  <rect class="box" x="140" y="125" width="110" height="22" rx="4"/>
  <text class="mono-sm" x="195" y="140" text-anchor="middle" fill="var(--vdb-ink)">POST /search</text>
  <circle cx="110" cy="140" r="12" fill="var(--vdb-primary)" stroke="var(--vdb-ink)" stroke-width="1"/>
  <text class="step-num" x="110" y="144" text-anchor="middle">1</text>

  <!-- Step 2: Parse JSON -->
  <rect class="box" x="305" y="163" width="90" height="24" rx="4"/>
  <text class="label-sm" x="350" y="179" text-anchor="middle">Parse JSON</text>
  <circle cx="285" cy="175" r="12" fill="var(--vdb-primary)" stroke="var(--vdb-ink)" stroke-width="1"/>
  <text class="step-num" x="285" y="179" text-anchor="middle">2</text>

  <!-- Step 3: Forward to Engine -->
  <line class="flow" x1="297" y1="210" x2="446" y2="210" marker-end="url(#arrowRight)"/>
  <circle cx="285" cy="210" r="12" fill="var(--vdb-primary)" stroke="var(--vdb-ink)" stroke-width="1"/>
  <text class="step-num" x="285" y="214" text-anchor="middle">3</text>

  <!-- Step 4: Query Planning -->
  <rect class="box" x="480" y="233" width="100" height="24" rx="4"/>
  <text class="label-sm" x="530" y="249" text-anchor="middle">Query Planning</text>
  <circle cx="460" cy="245" r="12" fill="var(--vdb-accent)" stroke="var(--vdb-ink)" stroke-width="1"/>
  <text class="step-num" x="460" y="249" text-anchor="middle">4</text>

  <!-- Decision: Strategy Choice -->
  <rect class="box" x="420" y="280" width="80" height="30" rx="4" fill="var(--vdb-neutral-1)"/>
  <text class="label-sm" x="460" y="299" text-anchor="middle" fill="var(--vdb-ink)">Strategy?</text>

  <!-- Step 5: Vector-First Path -->
  <line class="flow" x1="460" y1="310" x2="460" y2="330"/>
  <text class="label-sm" x="545" y="325">Vector-First</text>
  <line class="flow" x1="472" y1="340" x2="621" y2="340" marker-end="url(#arrowRight)"/>
  <rect class="box" x="665" y="328" width="75" height="24" rx="4"/>
  <text class="label-sm" x="702" y="344" text-anchor="middle" fill="var(--vdb-success)">HNSW</text>
  <circle cx="635" cy="340" r="12" fill="var(--vdb-success)" stroke="var(--vdb-ink)" stroke-width="1"/>
  <text class="step-num" x="635" y="344" text-anchor="middle">5</text>

  <!-- Return candidates -->
  <line class="flow-return" x1="623" y1="370" x2="474" y2="370" marker-end="url(#arrowLeft)"/>
  <text class="label-sm" x="548" y="385">Top 100 candidates</text>

  <!-- Step 6 & 7: Filter -->
  <line class="flow" x1="472" y1="400" x2="621" y2="400" marker-end="url(#arrowRight)"/>
  <rect class="box" x="665" y="388" width="75" height="24" rx="4"/>
  <text class="label-sm" x="702" y="404" text-anchor="middle" fill="var(--vdb-success)">Filter</text>
  <circle cx="460" cy="400" r="12" fill="var(--vdb-accent)" stroke="var(--vdb-ink)" stroke-width="1"/>
  <text class="step-num" x="460" y="404" text-anchor="middle">6</text>
  <circle cx="635" cy="400" r="12" fill="var(--vdb-success)" stroke="var(--vdb-ink)" stroke-width="1"/>
  <text class="step-num" x="635" y="404" text-anchor="middle">7</text>

  <!-- Return filtered results -->
  <line class="flow-return" x1="623" y1="430" x2="474" y2="430" marker-end="url(#arrowLeft)"/>
  <text class="label-sm" x="548" y="445">Top K results</text>

  <!-- Step 8: Return to Transport -->
  <line class="flow-return" x1="448" y1="460" x2="299" y2="460" marker-end="url(#arrowLeft)"/>
  <circle cx="460" cy="460" r="12" fill="var(--vdb-accent)" stroke="var(--vdb-ink)" stroke-width="1"/>
  <text class="step-num" x="460" y="464" text-anchor="middle">8</text>

  <!-- Step 9: Return to Client -->
  <line class="flow-return" x1="273" y1="460" x2="124" y2="460" marker-end="url(#arrowLeft)"/>
  <rect class="box" x="140" y="445" width="110" height="22" rx="4" fill="var(--vdb-neutral-1)"/>
  <text class="mono-sm" x="195" y="460" text-anchor="middle" fill="var(--vdb-ink)">JSON Response</text>
  <circle cx="285" cy="460" r="12" fill="var(--vdb-primary)" stroke="var(--vdb-ink)" stroke-width="1"/>
  <text class="step-num" x="285" y="464" text-anchor="middle">9</text>
</svg>
