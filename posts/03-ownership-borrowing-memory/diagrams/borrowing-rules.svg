<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" role="img" aria-labelledby="t d">
  <title id="t">Borrowing Rules: RwLock Analogy</title>
  <desc id="d">A diagram showing Rust's borrowing rules modelled as a reader-writer lock. The valid states are multiple immutable readers (&amp;T) OR a single mutable writer (&amp;mut T), both of which may access the owned Data. The invalid state combines a reader with a writer (&amp;T + &amp;mut T), which is a data race that Rust rejects at compile time with error[E0502].</desc>
  <style><![CDATA[
:root{--vdb-bg:#FAFAF7;--vdb-surface:#FFFFFF;--vdb-ink:#1A1A1A;--vdb-ink-muted:#5C5C5C;--vdb-ink-subtle:#9A9A9A;--vdb-border:#D9D9D4;--vdb-primary:#5B7FBF;--vdb-accent:#D98E5F;--vdb-success:#5C9E78;--vdb-warn:#B8895A;--vdb-alert:#C66B5E;--vdb-neutral-1:#EAEAE4;}
@media (prefers-color-scheme:dark){:root{--vdb-bg:#0E0F12;--vdb-surface:#16181C;--vdb-ink:#F2F2EE;--vdb-ink-muted:#B4B4AE;--vdb-ink-subtle:#6E6E68;--vdb-border:#2A2D33;--vdb-primary:#8BA8E0;--vdb-accent:#E8B088;--vdb-success:#7FBF9B;--vdb-warn:#D0A271;--vdb-alert:#D98579;--vdb-neutral-1:#1F2229;}}
.bg{fill:var(--vdb-bg);}
.title{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:20px;fill:var(--vdb-ink);}
.head{font-family:Inter,system-ui,sans-serif;font-weight:700;font-size:12px;fill:var(--vdb-ink);}
.label{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:11px;fill:var(--vdb-ink-muted);}
.mono{font-family:"JetBrains Mono",ui-monospace,Menlo,monospace;font-weight:500;font-size:13px;fill:var(--vdb-ink);}
.box{fill:var(--vdb-surface);stroke:var(--vdb-border);stroke-width:1.5;}
.box-primary{fill:var(--vdb-primary);stroke:var(--vdb-ink);stroke-width:1.5;}
.box-accent{fill:var(--vdb-accent);stroke:var(--vdb-ink);stroke-width:1.5;}
.box-success{fill:var(--vdb-success);stroke:var(--vdb-ink);stroke-width:1.5;}
.flow{stroke:var(--vdb-ink);stroke-width:1.5;fill:none;}
.flow-muted{stroke:var(--vdb-ink-muted);stroke-width:1;fill:none;stroke-dasharray:4 3;}
.on-fill{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:12px;fill:#FFFFFF;}
.subtitle{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:11px;fill:var(--vdb-ink-muted);}
.head-success{font-family:Inter,system-ui,sans-serif;font-weight:700;font-size:13px;fill:var(--vdb-success);}
.head-alert{font-family:Inter,system-ui,sans-serif;font-weight:700;font-size:13px;fill:var(--vdb-alert);}
.flow-success{stroke:var(--vdb-success);stroke-width:1.5;fill:none;stroke-dasharray:4 3;}
.flow-alert{stroke:var(--vdb-alert);stroke-width:1.5;fill:none;stroke-dasharray:4 3;}
.code{font-family:"JetBrains Mono",ui-monospace,Menlo,monospace;font-weight:500;font-size:9px;fill:var(--vdb-ink-muted);}
.code-alert{font-family:"JetBrains Mono",ui-monospace,Menlo,monospace;font-weight:500;font-size:8px;fill:var(--vdb-alert);}
]]></style>
  <defs>
    <marker id="viewArrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="var(--vdb-ink-muted)"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="700" height="400"/>

  <!-- Title -->
  <text class="title" x="350" y="30" text-anchor="middle">Borrowing Rules: RwLock Analogy</text>
  <text class="subtitle" x="350" y="50" text-anchor="middle">Multiple readers OR single writer, never both</text>

  <!-- VALID Section -->
  <rect class="box" x="40" y="75" width="400" height="145" rx="10"/>
  <circle cx="56" cy="92" r="5" fill="var(--vdb-success)" stroke="var(--vdb-ink)" stroke-width="0.75"/>
  <text class="head-success" x="68" y="96">VALID STATES</text>

  <!-- Multiple readers -->
  <rect class="box" x="60" y="120" width="170" height="85" rx="6" stroke="var(--vdb-success)"/>
  <text class="head" x="145" y="145" text-anchor="middle" fill="var(--vdb-success)">Multiple Readers</text>
  <text class="mono" x="145" y="169" text-anchor="middle">&amp;T, &amp;T, &amp;T</text>
  <text class="label" x="145" y="190" text-anchor="middle">Shared Lock</text>

  <!-- OR divider -->
  <text class="head" x="250" y="167" text-anchor="middle" font-size="14">OR</text>

  <!-- Single writer -->
  <rect class="box" x="270" y="120" width="150" height="85" rx="6" stroke="var(--vdb-primary)"/>
  <text class="head" x="345" y="145" text-anchor="middle" fill="var(--vdb-primary)">Single Writer</text>
  <text class="mono" x="345" y="169" text-anchor="middle">&amp;mut T</text>
  <text class="label" x="345" y="190" text-anchor="middle">Exclusive Lock</text>

  <!-- INVALID Section -->
  <rect class="box" x="40" y="235" width="400" height="145" rx="10"/>
  <rect x="51" y="248" width="10" height="10" rx="1.5" fill="var(--vdb-alert)" stroke="var(--vdb-ink)" stroke-width="0.75"/>
  <text class="head-alert" x="68" y="257">INVALID STATE - Compile Error!</text>

  <!-- Reader + Writer -->
  <rect class="box" x="100" y="280" width="280" height="85" rx="6" stroke="var(--vdb-alert)"/>
  <text class="head" x="240" y="305" text-anchor="middle" fill="var(--vdb-alert)">Reader + Writer Together</text>
  <text class="mono" x="240" y="329" text-anchor="middle">&amp;T + &amp;mut T</text>
  <text class="label" x="240" y="350" text-anchor="middle" fill="var(--vdb-alert)">Data Race! Rust prevents this at compile time</text>

  <!-- Data box -->
  <rect class="box" x="500" y="150" width="160" height="100" rx="8" stroke="var(--vdb-accent)" stroke-width="1.5"/>
  <text class="head" x="580" y="180" text-anchor="middle" fill="var(--vdb-accent)">Data</text>
  <text class="mono" x="580" y="206" text-anchor="middle">String</text>
  <text class="label" x="580" y="230" text-anchor="middle">(the owned value)</text>

  <!-- Arrow from valid states to data -->
  <line class="flow-success" x1="420" y1="162" x2="496" y2="185" marker-end="url(#viewArrow)"/>

  <!-- Dashed arrow from invalid to data (blocked) -->
  <line class="flow-alert" x1="380" y1="322" x2="496" y2="235"/>
  <!-- Blocked marker (circle with bar) -->
  <g>
    <circle cx="448" cy="280" r="9" fill="var(--vdb-surface)" stroke="var(--vdb-alert)" stroke-width="1.5"/>
    <line x1="442" y1="280" x2="454" y2="280" stroke="var(--vdb-alert)" stroke-width="1.5"/>
  </g>

  <!-- Compiler quote -->
  <rect class="box" x="480" y="280" width="200" height="60" rx="6" fill="var(--vdb-neutral-1)"/>
  <text class="code" x="580" y="302" text-anchor="middle">error[E0502]:</text>
  <text class="code-alert" x="580" y="318" text-anchor="middle">cannot borrow as mutable</text>
  <text class="code-alert" x="580" y="332" text-anchor="middle">because also borrowed</text>
</svg>
