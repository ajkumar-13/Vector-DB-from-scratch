<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-labelledby="t d">
  <title id="t">Write-Ahead Log: The Safety Net</title>
  <desc id="d">A comparison of writing without and with a write-ahead log. Without a WAL, a crash mid-update leaves the index partially modified and the data lost; with a WAL the operation is logged and fsync'd before the index is touched, so a restart can replay the log and restore state. The lower panel shows the append-only WAL entry format (CRC32, LEN, OP, ID, PAYLOAD) whose CRC32 verifies integrity on recovery.</desc>
  <style><![CDATA[
:root{--vdb-bg:#FAFAF7;--vdb-surface:#FFFFFF;--vdb-ink:#1A1A1A;--vdb-ink-muted:#5C5C5C;--vdb-ink-subtle:#9A9A9A;--vdb-border:#D9D9D4;--vdb-primary:#5B7FBF;--vdb-accent:#D98E5F;--vdb-success:#5C9E78;--vdb-warn:#B8895A;--vdb-alert:#C66B5E;--vdb-neutral-1:#EAEAE4;}
@media (prefers-color-scheme:dark){:root{--vdb-bg:#0E0F12;--vdb-surface:#16181C;--vdb-ink:#F2F2EE;--vdb-ink-muted:#B4B4AE;--vdb-ink-subtle:#6E6E68;--vdb-border:#2A2D33;--vdb-primary:#8BA8E0;--vdb-accent:#E8B088;--vdb-success:#7FBF9B;--vdb-warn:#D0A271;--vdb-alert:#D98579;--vdb-neutral-1:#1F2229;}}
.bg{fill:var(--vdb-bg);}
.title{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:20px;fill:var(--vdb-ink);}
.head{font-family:Inter,system-ui,sans-serif;font-weight:700;font-size:12px;fill:var(--vdb-ink);}
.label{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:11px;fill:var(--vdb-ink-muted);}
.mono{font-family:"JetBrains Mono",ui-monospace,Menlo,monospace;font-weight:500;font-size:13px;fill:var(--vdb-ink);}
.box{fill:var(--vdb-surface);stroke:var(--vdb-border);stroke-width:1.5;}
.box-primary{fill:var(--vdb-primary);stroke:var(--vdb-ink);stroke-width:1.5;}
.box-accent{fill:var(--vdb-accent);stroke:var(--vdb-ink);stroke-width:1.5;}
.box-success{fill:var(--vdb-success);stroke:var(--vdb-ink);stroke-width:1.5;}
.flow{stroke:var(--vdb-ink);stroke-width:1.5;fill:none;}
.flow-muted{stroke:var(--vdb-ink-muted);stroke-width:1;fill:none;stroke-dasharray:4 3;}
.on-fill{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:12px;fill:#FFFFFF;}
.box-alert{fill:var(--vdb-alert);stroke:var(--vdb-ink);stroke-width:1.5;}
.box-warn{fill:var(--vdb-warn);stroke:var(--vdb-ink);stroke-width:1.5;}
.panel-head{font-family:Inter,system-ui,sans-serif;font-weight:700;font-size:12px;fill:var(--vdb-ink);}
.sub{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:9px;fill:var(--vdb-ink-muted);}
.monosm{font-family:"JetBrains Mono",ui-monospace,Menlo,monospace;font-weight:600;font-size:9px;fill:var(--vdb-ink);}
.monosm-w{font-family:"JetBrains Mono",ui-monospace,Menlo,monospace;font-weight:600;font-size:9px;fill:#FFFFFF;}
.subw{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:7px;fill:#FFFFFF;}
]]></style>

  <defs>
    <marker id="walArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="var(--vdb-ink)"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="800" height="450"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Write-Ahead Log: The Safety Net</text>
  <text x="400" y="50" text-anchor="middle" class="label">Log the operation BEFORE applying it to indexes</text>

  <!-- Without WAL Section -->
  <rect x="40" y="70" width="340" height="170" rx="10" class="box"/>
  <rect x="40" y="70" width="340" height="28" rx="10" class="box-alert"/>
  <rect x="40" y="84" width="340" height="14" class="box-alert"/>
  <circle cx="158" cy="84" r="4" fill="#FFFFFF"/>
  <text x="210" y="88" text-anchor="middle" class="on-fill">Without WAL</text>

  <!-- Without WAL flow -->
  <rect x="60" y="115" width="80" height="35" rx="4" class="box-primary"/>
  <text x="100" y="137" text-anchor="middle" class="on-fill">Insert</text>

  <line x1="142" y1="132" x2="172" y2="132" class="flow" marker-end="url(#walArrow)"/>

  <rect x="175" y="115" width="90" height="35" rx="4" class="box-warn"/>
  <text x="220" y="137" text-anchor="middle" class="on-fill">Update Index</text>

  <line x1="267" y1="132" x2="297" y2="132" class="flow" marker-end="url(#walArrow)"/>

  <rect x="300" y="115" width="60" height="35" rx="4" class="box-alert"/>
  <text x="330" y="137" text-anchor="middle" class="on-fill">CRASH</text>

  <!-- Lost data indicator -->
  <rect x="60" y="165" width="300" height="60" rx="6" class="box"/>
  <rect x="74" y="187" width="9" height="9" rx="1.5" fill="var(--vdb-alert)" stroke="var(--vdb-ink)" stroke-width="0.75"/>
  <text x="92" y="195" text-anchor="start" class="head" style="fill:var(--vdb-alert);">DATA LOST</text>
  <text x="210" y="212" text-anchor="middle" class="label">Index partially updated. Inconsistent state.</text>

  <!-- With WAL Section -->
  <rect x="420" y="70" width="340" height="170" rx="10" class="box"/>
  <rect x="420" y="70" width="340" height="28" rx="10" class="box-success"/>
  <rect x="420" y="84" width="340" height="14" class="box-success"/>
  <circle cx="538" cy="84" r="4" fill="#FFFFFF"/>
  <text x="590" y="88" text-anchor="middle" class="on-fill">With WAL</text>

  <!-- With WAL flow -->
  <rect x="440" y="115" width="80" height="35" rx="4" class="box-primary"/>
  <text x="480" y="137" text-anchor="middle" class="on-fill">Insert</text>

  <line x1="522" y1="132" x2="547" y2="132" class="flow" marker-end="url(#walArrow)"/>

  <rect x="550" y="115" width="80" height="35" rx="4" class="box-success"/>
  <text x="590" y="131" text-anchor="middle" class="on-fill">Write WAL</text>
  <text x="590" y="144" text-anchor="middle" class="subw">fsync!</text>

  <line x1="632" y1="132" x2="657" y2="132" class="flow" marker-end="url(#walArrow)"/>

  <rect x="660" y="115" width="80" height="35" rx="4" class="box-warn"/>
  <text x="700" y="137" text-anchor="middle" class="on-fill">Update Idx</text>

  <!-- Recovery -->
  <rect x="440" y="165" width="300" height="60" rx="6" class="box"/>
  <rect x="454" y="187" width="9" height="9" rx="1.5" fill="var(--vdb-success)" stroke="var(--vdb-ink)" stroke-width="0.75"/>
  <text x="472" y="195" text-anchor="start" class="head" style="fill:var(--vdb-success);">RECOVERABLE</text>
  <text x="590" y="212" text-anchor="middle" class="label">On restart: replay WAL, restore state</text>

  <!-- WAL Entry Format -->
  <rect x="100" y="260" width="600" height="170" rx="10" class="box"/>
  <text x="400" y="288" text-anchor="middle" class="panel-head">WAL Entry Format</text>

  <!-- Binary layout -->
  <rect x="130" y="310" width="540" height="50" rx="4" fill="var(--vdb-neutral-1)" stroke="var(--vdb-border)" stroke-width="1"/>

  <rect x="135" y="315" width="100" height="40" rx="2" class="box-alert"/>
  <text x="185" y="338" text-anchor="middle" class="monosm-w">CRC32</text>
  <text x="185" y="350" text-anchor="middle" class="subw">4 bytes</text>

  <rect x="240" y="315" width="80" height="40" rx="2" class="box-warn"/>
  <text x="280" y="338" text-anchor="middle" class="monosm-w">LEN</text>
  <text x="280" y="350" text-anchor="middle" class="subw">4 bytes</text>

  <rect x="325" y="315" width="60" height="40" rx="2" class="box-primary"/>
  <text x="355" y="338" text-anchor="middle" class="monosm-w">OP</text>
  <text x="355" y="350" text-anchor="middle" class="subw">1 byte</text>

  <rect x="390" y="315" width="100" height="40" rx="2" class="box-success"/>
  <text x="440" y="338" text-anchor="middle" class="monosm-w">ID</text>
  <text x="440" y="350" text-anchor="middle" class="subw">variable</text>

  <rect x="495" y="315" width="175" height="40" rx="2" class="box-accent"/>
  <text x="582" y="338" text-anchor="middle" class="monosm-w">PAYLOAD (vector data)</text>
  <text x="582" y="350" text-anchor="middle" class="subw">variable</text>

  <text x="400" y="398" text-anchor="middle" class="head">Append-only: Never modify, only append new entries</text>
  <text x="400" y="418" text-anchor="middle" class="label">CRC32 verifies data integrity on recovery</text>
</svg>
