<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="t d">
  <title id="t">HNSW: Hierarchical Navigable Small World</title>
  <desc id="d">A three-layer HNSW graph showing how nearest-neighbour search proceeds top-down. Layer 2 holds a few sparsely connected entry points, Layer 1 a larger subset with longer edges, and Layer 0 (base) contains all nodes with dense connections. A query enters at the top, descends through the layers, and does a fine search at the base, giving O(log N) search instead of scanning every vector.</desc>
  <style><![CDATA[
:root{--vdb-bg:#FAFAF7;--vdb-surface:#FFFFFF;--vdb-ink:#1A1A1A;--vdb-ink-muted:#5C5C5C;--vdb-ink-subtle:#9A9A9A;--vdb-border:#D9D9D4;--vdb-primary:#5B7FBF;--vdb-accent:#D98E5F;--vdb-success:#5C9E78;--vdb-warn:#B8895A;--vdb-alert:#C66B5E;--vdb-neutral-1:#EAEAE4;}
@media (prefers-color-scheme:dark){:root{--vdb-bg:#0E0F12;--vdb-surface:#16181C;--vdb-ink:#F2F2EE;--vdb-ink-muted:#B4B4AE;--vdb-ink-subtle:#6E6E68;--vdb-border:#2A2D33;--vdb-primary:#8BA8E0;--vdb-accent:#E8B088;--vdb-success:#7FBF9B;--vdb-warn:#D0A271;--vdb-alert:#D98579;--vdb-neutral-1:#1F2229;}}
.bg{fill:var(--vdb-bg);}
.title{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:20px;fill:var(--vdb-ink);}
.head{font-family:Inter,system-ui,sans-serif;font-weight:700;font-size:12px;fill:var(--vdb-ink);}
.label{font-family:Inter,system-ui,sans-serif;font-weight:400;font-size:11px;fill:var(--vdb-ink-muted);}
.mono{font-family:"JetBrains Mono",ui-monospace,Menlo,monospace;font-weight:500;font-size:13px;fill:var(--vdb-ink);}
.box{fill:var(--vdb-surface);stroke:var(--vdb-border);stroke-width:1.5;}
.box-primary{fill:var(--vdb-primary);stroke:var(--vdb-ink);stroke-width:1.5;}
.box-accent{fill:var(--vdb-accent);stroke:var(--vdb-ink);stroke-width:1.5;}
.box-success{fill:var(--vdb-success);stroke:var(--vdb-ink);stroke-width:1.5;}
.on-fill{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:12px;fill:#FFFFFF;}
.flow{stroke:var(--vdb-ink);stroke-width:1.5;fill:none;}
.flow-muted{stroke:var(--vdb-ink-muted);stroke-width:1;fill:none;stroke-dasharray:4 3;}
.node-success{fill:var(--vdb-surface);stroke:var(--vdb-success);stroke-width:1.5;}
.node-warn{fill:var(--vdb-surface);stroke:var(--vdb-warn);stroke-width:1.5;}
.node-alert{fill:var(--vdb-surface);stroke:var(--vdb-alert);stroke-width:1.5;}
.edge-success{stroke:var(--vdb-success);stroke-width:1;fill:none;}
.edge-warn{stroke:var(--vdb-warn);stroke-width:1.5;fill:none;}
.edge-alert{stroke:var(--vdb-alert);stroke-width:1.5;fill:none;}
.search-flow{stroke:var(--vdb-primary);stroke-width:1.5;fill:none;}
.search-label{font-family:Inter,system-ui,sans-serif;font-weight:600;font-size:9px;fill:var(--vdb-primary);}
.node-label{font-family:Inter,system-ui,sans-serif;font-weight:700;font-size:10px;fill:var(--vdb-ink);}
]]></style>

  <rect class="bg" x="0" y="0" width="800" height="500"/>

  <defs>
    <marker id="hnswArrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="var(--vdb-primary)"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">HNSW: Hierarchical Navigable Small World</text>
  <text x="400" y="50" text-anchor="middle" class="label">Multi-layer graph for O(log N) nearest neighbor search</text>

  <!-- Layer 0 (bottom) - Dense -->
  <rect x="50" y="350" width="700" height="120" rx="8" class="box"/>
  <rect x="50" y="350" width="700" height="22" rx="8" class="box-success"/>
  <rect x="50" y="360" width="700" height="12" class="box-success"/>
  <text x="80" y="365" class="on-fill" font-size="11">Layer 0 (Base) - ALL nodes, dense connections</text>

  <!-- Layer 0 connections (many) -->
  <line x1="135" y1="420" x2="185" y2="420" class="edge-success"/>
  <line x1="215" y1="420" x2="265" y2="420" class="edge-success"/>
  <line x1="295" y1="420" x2="345" y2="420" class="edge-success"/>
  <line x1="375" y1="420" x2="425" y2="420" class="edge-success"/>
  <line x1="455" y1="420" x2="505" y2="420" class="edge-success"/>
  <line x1="535" y1="420" x2="585" y2="420" class="edge-success"/>
  <line x1="615" y1="420" x2="665" y2="420" class="edge-success"/>
  <line x1="200" y1="405" x2="280" y2="435" class="edge-success"/>
  <line x1="360" y1="405" x2="440" y2="435" class="edge-success"/>
  <line x1="520" y1="405" x2="600" y2="435" class="edge-success"/>

  <!-- Layer 0 nodes -->
  <circle cx="120" cy="420" r="14" class="node-success"/>
  <circle cx="200" cy="420" r="14" class="node-success"/>
  <circle cx="280" cy="420" r="14" class="node-success"/>
  <circle cx="360" cy="420" r="14" class="node-success"/>
  <circle cx="440" cy="420" r="14" class="node-success"/>
  <circle cx="520" cy="420" r="14" class="node-success"/>
  <circle cx="600" cy="420" r="14" class="node-success"/>
  <circle cx="680" cy="420" r="14" class="node-success"/>

  <!-- Layer 1 (middle) - Sparse -->
  <rect x="100" y="220" width="600" height="110" rx="8" class="box"/>
  <rect x="100" y="220" width="600" height="22" rx="8" class="box-accent"/>
  <rect x="100" y="230" width="600" height="12" class="box-accent"/>
  <text x="130" y="235" class="on-fill" font-size="11">Layer 1 - Subset of nodes, longer edges</text>

  <!-- Vertical connections Layer 1 -> Layer 0 -->
  <line x1="200" y1="304" x2="200" y2="406" class="flow-muted"/>
  <line x1="360" y1="304" x2="360" y2="406" class="flow-muted"/>
  <line x1="520" y1="304" x2="520" y2="406" class="flow-muted"/>
  <line x1="680" y1="304" x2="680" y2="406" class="flow-muted"/>

  <!-- Layer 1 connections -->
  <line x1="214" y1="290" x2="346" y2="290" class="edge-warn"/>
  <line x1="374" y1="290" x2="506" y2="290" class="edge-warn"/>
  <line x1="534" y1="290" x2="666" y2="290" class="edge-warn"/>

  <!-- Layer 1 nodes (subset) -->
  <circle cx="200" cy="290" r="14" class="node-warn"/>
  <circle cx="360" cy="290" r="14" class="node-warn"/>
  <circle cx="520" cy="290" r="14" class="node-warn"/>
  <circle cx="680" cy="290" r="14" class="node-warn"/>

  <!-- Layer 2 (top) - Very sparse -->
  <rect x="200" y="100" width="400" height="100" rx="8" class="box"/>
  <rect x="200" y="100" width="400" height="22" rx="8" class="box-primary"/>
  <rect x="200" y="110" width="400" height="12" class="box-primary"/>
  <text x="230" y="115" class="on-fill" font-size="11">Layer 2 (Top) - Few entry points</text>

  <!-- Vertical connections Layer 2 -> Layer 1 -->
  <line x1="360" y1="179" x2="360" y2="276" class="flow-muted"/>
  <line x1="520" y1="179" x2="520" y2="276" class="flow-muted"/>

  <!-- Layer 2 connection -->
  <line x1="374" y1="165" x2="506" y2="165" class="edge-alert"/>

  <!-- Layer 2 nodes (very few) -->
  <circle cx="360" cy="165" r="14" class="node-alert"/>
  <text x="360" y="169" text-anchor="middle" class="node-label">EP</text>
  <circle cx="520" cy="165" r="14" class="node-alert"/>

  <!-- Legend -->
  <rect x="50" y="60" width="130" height="35" rx="4" class="box"/>
  <text x="115" y="82" text-anchor="middle" class="head" font-size="10">O(log N) search!</text>

  <!-- Query path label -->
  <text x="50" y="115" class="search-label" font-size="11">Search Path:</text>

  <!-- Entry arrow -->
  <path d="M250 95 Q 300 130, 344 162" class="search-flow" marker-end="url(#hnswArrow)"/>
  <text x="255" y="88" class="search-label">1. Enter at top</text>

  <!-- Descend arrow -->
  <path d="M360 180 Q 360 230, 360 274" class="search-flow" marker-end="url(#hnswArrow)"/>
  <text x="378" y="214" class="search-label">2. Descend</text>

  <!-- Search at base -->
  <path d="M360 305 Q 400 350, 438 404" class="search-flow" marker-end="url(#hnswArrow)"/>
  <text x="395" y="345" class="search-label">3. Fine search</text>

  <!-- Result (highlighted target node) -->
  <circle cx="440" cy="420" r="18" class="search-flow"/>
</svg>
