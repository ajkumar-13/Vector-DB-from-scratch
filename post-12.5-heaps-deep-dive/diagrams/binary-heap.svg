<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 420">
  <defs>
    <linearGradient id="heapGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8787;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fa5252;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="750" height="420" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="375" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#212529">Binary Heap: Efficient Top-K Selection</text>
  <text x="375" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#868e96">Min-heap keeps track of K best results during search</text>
  
  <!-- Heap visualization -->
  <rect x="50" y="70" width="350" height="290" rx="10" fill="white" stroke="#fa5252" stroke-width="2"/>
  <text x="225" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#c92a2a" font-weight="bold">Min-Heap (K=5)</text>
  
  <!-- Heap tree structure -->
  <!-- Level 0 (root - min) -->
  <circle cx="225" cy="150" r="25" fill="#ffe3e3" stroke="#fa5252" stroke-width="2"/>
  <text x="225" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#c92a2a" font-weight="bold">0.72</text>
  <text x="225" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#868e96">min (worst of top-5)</text>
  
  <!-- Level 1 -->
  <line x1="205" y1="170" x2="145" y2="210" stroke="#ced4da" stroke-width="2"/>
  <line x1="245" y1="170" x2="305" y2="210" stroke="#ced4da" stroke-width="2"/>
  
  <circle cx="145" cy="230" r="22" fill="#ffc9c9" stroke="#fa5252" stroke-width="1"/>
  <text x="145" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#c92a2a">0.78</text>
  
  <circle cx="305" cy="230" r="22" fill="#ffc9c9" stroke="#fa5252" stroke-width="1"/>
  <text x="305" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#c92a2a">0.85</text>
  
  <!-- Level 2 -->
  <line x1="130" y1="250" x2="95" y2="285" stroke="#ced4da" stroke-width="2"/>
  <line x1="160" y1="250" x2="195" y2="285" stroke="#ced4da" stroke-width="2"/>
  
  <circle cx="95" cy="305" r="20" fill="#ff8787" stroke="#fa5252" stroke-width="1"/>
  <text x="95" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">0.91</text>
  
  <circle cx="195" cy="305" r="20" fill="#ff8787" stroke="#fa5252" stroke-width="1"/>
  <text x="195" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">0.95</text>
  
  <!-- Heap property note -->
  <text x="225" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#495057" font-weight="bold">Property: parent ≤ children</text>
  
  <!-- Algorithm explanation -->
  <rect x="430" y="70" width="280" height="290" rx="10" fill="white" stroke="#339af0" stroke-width="2"/>
  <text x="570" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1971c2" font-weight="bold">Top-K Algorithm</text>
  
  <!-- Steps -->
  <rect x="450" y="115" width="240" height="55" rx="6" fill="#e7f5ff" stroke="#74c0fc" stroke-width="1"/>
  <text x="470" y="138" font-family="Arial, sans-serif" font-size="9" fill="#1971c2" font-weight="bold">1. New candidate: 0.88</text>
  <text x="470" y="158" font-family="Arial, sans-serif" font-size="9" fill="#495057">Compare with heap min (0.72)</text>
  
  <rect x="450" y="180" width="240" height="55" rx="6" fill="#fff9db" stroke="#fab005" stroke-width="1"/>
  <text x="470" y="203" font-family="Arial, sans-serif" font-size="9" fill="#e67700" font-weight="bold">2. 0.88 &gt; 0.72? Yes!</text>
  <text x="470" y="223" font-family="Arial, sans-serif" font-size="9" fill="#495057">This is better than worst result</text>
  
  <rect x="450" y="245" width="240" height="55" rx="6" fill="#d3f9d8" stroke="#40c057" stroke-width="1"/>
  <text x="470" y="268" font-family="Arial, sans-serif" font-size="9" fill="#2b8a3e" font-weight="bold">3. Replace &amp; heapify</text>
  <text x="470" y="288" font-family="Arial, sans-serif" font-size="9" fill="#495057">Pop min, push 0.88, restore heap</text>
  
  <rect x="450" y="310" width="240" height="40" rx="6" fill="#f1f3f5" stroke="#ced4da" stroke-width="1"/>
  <text x="570" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#495057" font-weight="bold">O(log K) per comparison!</text>
  
  <!-- Complexity box -->
  <rect x="50" y="375" width="650" height="35" rx="8" fill="#ebfbee" stroke="#69db7c" stroke-width="2"/>
  <text x="375" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2b8a3e" font-weight="bold">Total: O(N log K) instead of O(N log N) for sorting — crucial for large datasets!</text>
</svg>
