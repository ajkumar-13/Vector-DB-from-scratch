<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 400">
  <defs>
    <linearGradient id="cosineBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e7f5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d0ebff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="750" height="400" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="375" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#212529">Cosine Similarity: Measuring Vector Similarity</text>
  <text x="375" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#868e96">The angle between vectors determines semantic similarity</text>
  
  <!-- Vector diagram -->
  <rect x="50" y="70" width="300" height="280" rx="10" fill="url(#cosineBg)" stroke="#339af0" stroke-width="2"/>
  
  <!-- Coordinate system -->
  <line x1="100" y1="300" x2="320" y2="300" stroke="#495057" stroke-width="2"/>
  <line x1="100" y1="300" x2="100" y2="100" stroke="#495057" stroke-width="2"/>
  <text x="330" y="305" font-family="Arial, sans-serif" font-size="10" fill="#495057">x</text>
  <text x="92" y="95" font-family="Arial, sans-serif" font-size="10" fill="#495057">y</text>
  
  <!-- Vector A (similar) -->
  <line x1="100" y1="300" x2="280" y2="150" stroke="#40c057" stroke-width="3"/>
  <circle cx="280" cy="150" r="6" fill="#40c057"/>
  <text x="290" y="145" font-family="Arial, sans-serif" font-size="11" fill="#2b8a3e" font-weight="bold">A "cat"</text>
  
  <!-- Vector B (similar) -->
  <line x1="100" y1="300" x2="260" y2="130" stroke="#339af0" stroke-width="3"/>
  <circle cx="260" cy="130" r="6" fill="#339af0"/>
  <text x="270" y="120" font-family="Arial, sans-serif" font-size="11" fill="#1971c2" font-weight="bold">B "kitten"</text>
  
  <!-- Vector C (different) -->
  <line x1="100" y1="300" x2="300" y2="280" stroke="#fa5252" stroke-width="3"/>
  <circle cx="300" cy="280" r="6" fill="#fa5252"/>
  <text x="310" y="285" font-family="Arial, sans-serif" font-size="11" fill="#c92a2a" font-weight="bold">C "car"</text>
  
  <!-- Angle arcs -->
  <path d="M150 270 Q 160 250, 180 250" fill="none" stroke="#2b8a3e" stroke-width="2"/>
  <text x="160" y="245" font-family="Arial, sans-serif" font-size="9" fill="#2b8a3e">θ small</text>
  
  <path d="M180 290 Q 220 285, 250 290" fill="none" stroke="#fa5252" stroke-width="2"/>
  <text x="215" y="282" font-family="Arial, sans-serif" font-size="9" fill="#c92a2a">θ large</text>
  
  <!-- Similarity values -->
  <rect x="110" y="200" width="80" height="25" rx="4" fill="#d3f9d8" stroke="#40c057" stroke-width="1"/>
  <text x="150" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2b8a3e" font-weight="bold">sim ≈ 0.95</text>
  
  <rect x="200" y="230" width="80" height="25" rx="4" fill="#ffe3e3" stroke="#fa5252" stroke-width="1"/>
  <text x="240" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c92a2a" font-weight="bold">sim ≈ 0.20</text>
  
  <!-- Formula section -->
  <rect x="380" y="70" width="340" height="130" rx="10" fill="white" stroke="#5c7cfa" stroke-width="2"/>
  <text x="550" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#3b5bdb" font-weight="bold">Formula</text>
  
  <text x="550" y="140" text-anchor="middle" font-family="serif" font-size="16" fill="#212529">cos(θ) = (A · B) / (||A|| × ||B||)</text>
  
  <text x="400" y="175" font-family="Arial, sans-serif" font-size="9" fill="#495057">A · B = dot product (sum of element products)</text>
  <text x="400" y="190" font-family="Arial, sans-serif" font-size="9" fill="#495057">||A|| = magnitude (sqrt of sum of squares)</text>
  
  <!-- Range visualization -->
  <rect x="380" y="215" width="340" height="50" rx="8" fill="#f1f3f5" stroke="#ced4da" stroke-width="1"/>
  <text x="400" y="240" font-family="Arial, sans-serif" font-size="10" fill="#495057" font-weight="bold">Output Range:</text>
  
  <rect x="490" y="225" width="30" height="25" rx="3" fill="#fa5252"/>
  <text x="505" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">-1</text>
  <text x="505" y="257" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#868e96">opposite</text>
  
  <rect x="540" y="225" width="30" height="25" rx="3" fill="#ffc9c9"/>
  <text x="555" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c92a2a">0</text>
  <text x="555" y="257" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#868e96">orthogonal</text>
  
  <rect x="590" y="225" width="30" height="25" rx="3" fill="#69db7c"/>
  <text x="605" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">1</text>
  <text x="605" y="257" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#868e96">identical</text>
  
  <!-- Code example -->
  <rect x="380" y="280" width="340" height="95" rx="10" fill="#1e1e1e" stroke="#495057" stroke-width="1"/>
  <text x="400" y="305" font-family="monospace" font-size="9" fill="#569cd6">fn</text>
  <text x="420" y="305" font-family="monospace" font-size="9" fill="#dcdcaa">cosine_similarity</text>
  <text x="530" y="305" font-family="monospace" font-size="9" fill="#d4d4d4">(a: &amp;[f32], b: &amp;[f32]) -&gt; f32 {</text>
  <text x="410" y="325" font-family="monospace" font-size="9" fill="#569cd6">let</text>
  <text x="435" y="325" font-family="monospace" font-size="9" fill="#d4d4d4">dot: f32 = a.iter().zip(b).map(|(x, y)| x * y).sum();</text>
  <text x="410" y="345" font-family="monospace" font-size="9" fill="#569cd6">let</text>
  <text x="435" y="345" font-family="monospace" font-size="9" fill="#d4d4d4">mag_a = a.iter().map(|x| x * x).sum::&lt;f32&gt;().sqrt();</text>
  <text x="410" y="365" font-family="monospace" font-size="9" fill="#d4d4d4">dot / (mag_a * mag_b)</text>
  <text x="400" y="378" font-family="monospace" font-size="9" fill="#d4d4d4">}</text>
</svg>
