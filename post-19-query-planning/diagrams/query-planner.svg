<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460">
  <defs>
    <linearGradient id="vfGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#74c0fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#339af0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ffGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#69db7c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#40c057;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hybGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b197fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7950f2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="plannerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd43b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fab005;stop-opacity:1" />
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowGray" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#868e96"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="460" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#212529">Query Planner: Strategy Selection</text>
  <text x="400" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#868e96">Cost-based optimizer chooses the best execution path based on filter selectivity</text>

  <!-- Query Input -->
  <rect x="280" y="70" width="240" height="50" rx="10" fill="white" stroke="#495057" stroke-width="2" filter="url(#dropShadow)"/>
  <text x="400" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#495057">Incoming Query</text>
  <text x="400" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#868e96">vector + filters + top_k</text>

  <!-- Arrow down to planner -->
  <line x1="400" y1="120" x2="400" y2="145" stroke="#868e96" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- Query Planner -->
  <rect x="250" y="150" width="300" height="60" rx="10" fill="white" stroke="#fab005" stroke-width="3" filter="url(#dropShadow)"/>
  <rect x="250" y="150" width="300" height="25" rx="10" fill="url(#plannerGrad)"/>
  <rect x="250" y="163" width="300" height="12" fill="url(#plannerGrad)"/>
  <text x="280" y="168" font-family="Arial, sans-serif" font-size="12" fill="#212529" font-weight="bold">Query Planner (Cost Estimator)</text>
  <text x="400" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#495057">Estimates selectivity → picks cheapest strategy</text>

  <!-- Three strategy arrows -->
  <line x1="300" y1="210" x2="130" y2="260" stroke="#868e96" stroke-width="2" marker-end="url(#arrowGray)"/>
  <line x1="400" y1="210" x2="400" y2="260" stroke="#868e96" stroke-width="2" marker-end="url(#arrowGray)"/>
  <line x1="500" y1="210" x2="670" y2="260" stroke="#868e96" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- Selectivity labels on arrows -->
  <text x="195" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#339af0" font-weight="bold">high sel. (&gt;50%)</text>
  <text x="400" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7950f2" font-weight="bold">medium (1-50%)</text>
  <text x="605" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#40c057" font-weight="bold">low sel. (&lt;1%)</text>

  <!-- Strategy 1: Vector-First -->
  <rect x="30" y="265" width="220" height="170" rx="10" fill="white" stroke="#339af0" stroke-width="2" filter="url(#dropShadow)"/>
  <rect x="30" y="265" width="220" height="25" rx="10" fill="url(#vfGrad)"/>
  <rect x="30" y="278" width="220" height="12" fill="url(#vfGrad)"/>
  <text x="50" y="283" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">Strategy 1: Vector-First</text>

  <text x="140" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#495057">1. HNSW search (all vectors)</text>
  <text x="140" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#495057">2. Post-filter results</text>
  <text x="140" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#868e96">Best when most vectors</text>
  <text x="140" y="363" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#868e96">pass the filter</text>

  <rect x="55" y="378" width="170" height="25" rx="4" fill="#e7f5ff" stroke="#74c0fc" stroke-width="1"/>
  <text x="140" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1971c2">Cost: O(log N) + filter</text>

  <text x="140" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#339af0" font-weight="bold">e.g. "year &gt; 2000" (90% match)</text>

  <!-- Strategy 2: Hybrid -->
  <rect x="280" y="265" width="240" height="170" rx="10" fill="white" stroke="#7950f2" stroke-width="2" filter="url(#dropShadow)"/>
  <rect x="280" y="265" width="240" height="25" rx="10" fill="url(#hybGrad)"/>
  <rect x="280" y="278" width="240" height="12" fill="url(#hybGrad)"/>
  <text x="300" y="283" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">Strategy 2: Bitmask-HNSW</text>

  <text x="400" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#495057">1. Build allow-list bitmask</text>
  <text x="400" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#495057">2. Filtered HNSW traversal</text>
  <text x="400" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#868e96">Best for moderate selectivity</text>
  <text x="400" y="363" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#868e96">Graph still navigable</text>

  <rect x="310" y="378" width="180" height="25" rx="4" fill="#f3f0ff" stroke="#b197fc" stroke-width="1"/>
  <text x="400" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6741d9">Cost: O(log N × 1/sel)</text>

  <text x="400" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7950f2" font-weight="bold">e.g. "category=tech" (15%)</text>

  <!-- Strategy 3: Filter-First -->
  <rect x="550" y="265" width="220" height="170" rx="10" fill="white" stroke="#40c057" stroke-width="2" filter="url(#dropShadow)"/>
  <rect x="550" y="265" width="220" height="25" rx="10" fill="url(#ffGrad)"/>
  <rect x="550" y="278" width="220" height="12" fill="url(#ffGrad)"/>
  <text x="570" y="283" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">Strategy 3: Filter-First</text>

  <text x="660" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#495057">1. Tantivy metadata query</text>
  <text x="660" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#495057">2. Brute-force on survivors</text>
  <text x="660" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#868e96">Best when very few vectors</text>
  <text x="660" y="363" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#868e96">pass the filter</text>

  <rect x="575" y="378" width="170" height="25" rx="4" fill="#ebfbee" stroke="#69db7c" stroke-width="1"/>
  <text x="660" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2b8a3e">Cost: O(F) brute force</text>

  <text x="660" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#40c057" font-weight="bold">e.g. "author=Smith" (0.1%)</text>
</svg>