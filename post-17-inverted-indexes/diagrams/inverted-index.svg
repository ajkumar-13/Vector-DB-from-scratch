<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 400">
  <defs>
    <linearGradient id="invertGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#748ffc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5c7cfa;stop-opacity:1" />
    </linearGradient>
    <marker id="invArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#495057"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="750" height="400" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="375" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#212529">Inverted Index: Enabling Filter Queries</text>
  <text x="375" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#868e96">Map metadata values → document IDs for fast filtering</text>
  
  <!-- Forward Index (documents) -->
  <rect x="50" y="70" width="280" height="150" rx="10" fill="white" stroke="#868e96" stroke-width="2"/>
  <text x="190" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#495057" font-weight="bold">📄 Documents (Forward View)</text>
  
  <!-- Document entries -->
  <rect x="70" y="110" width="240" height="25" rx="3" fill="#e7f5ff" stroke="#74c0fc" stroke-width="1"/>
  <text x="80" y="127" font-family="monospace" font-size="8" fill="#1971c2">doc_1: {category: "tech", author: "alice"}</text>
  
  <rect x="70" y="140" width="240" height="25" rx="3" fill="#e7f5ff" stroke="#74c0fc" stroke-width="1"/>
  <text x="80" y="157" font-family="monospace" font-size="8" fill="#1971c2">doc_2: {category: "tech", author: "bob"}</text>
  
  <rect x="70" y="170" width="240" height="25" rx="3" fill="#e7f5ff" stroke="#74c0fc" stroke-width="1"/>
  <text x="80" y="187" font-family="monospace" font-size="8" fill="#1971c2">doc_3: {category: "news", author: "alice"}</text>
  
  <!-- Arrow -->
  <line x1="330" y1="145" x2="380" y2="145" stroke="#495057" stroke-width="2" marker-end="url(#invArrow)"/>
  <text x="355" y="135" font-family="Arial, sans-serif" font-size="8" fill="#495057">invert</text>
  
  <!-- Inverted Index -->
  <rect x="390" y="70" width="310" height="150" rx="10" fill="white" stroke="#5c7cfa" stroke-width="2"/>
  <text x="545" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3b5bdb" font-weight="bold">🔄 Inverted Index</text>
  
  <!-- Category index -->
  <rect x="410" y="110" width="130" height="50" rx="4" fill="#d3f9d8" stroke="#40c057" stroke-width="1"/>
  <text x="475" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#2b8a3e" font-weight="bold">category</text>
  <text x="420" y="145" font-family="monospace" font-size="8" fill="#495057">"tech" → [1, 2]</text>
  <text x="420" y="157" font-family="monospace" font-size="8" fill="#495057">"news" → [3]</text>
  
  <!-- Author index -->
  <rect x="550" y="110" width="130" height="50" rx="4" fill="#fff9db" stroke="#fab005" stroke-width="1"/>
  <text x="615" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#e67700" font-weight="bold">author</text>
  <text x="560" y="145" font-family="monospace" font-size="8" fill="#495057">"alice" → [1, 3]</text>
  <text x="560" y="157" font-family="monospace" font-size="8" fill="#495057">"bob" → [2]</text>
  
  <text x="545" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#868e96">HashMap&lt;String, HashSet&lt;DocId&gt;&gt;</text>
  
  <!-- Query example -->
  <rect x="50" y="240" width="650" height="140" rx="10" fill="white" stroke="#339af0" stroke-width="2"/>
  <text x="375" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1971c2" font-weight="bold">Filter Query Example</text>
  
  <!-- Query -->
  <rect x="80" y="285" width="180" height="40" rx="6" fill="#e7f5ff" stroke="#339af0" stroke-width="1"/>
  <text x="170" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1971c2" font-weight="bold">Filter: category="tech"</text>
  <text x="170" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#495057">AND author="alice"</text>
  
  <line x1="260" y1="305" x2="305" y2="305" stroke="#495057" stroke-width="2" marker-end="url(#invArrow)"/>
  
  <!-- Lookup -->
  <rect x="310" y="285" width="160" height="40" rx="6" fill="#fff9db" stroke="#fab005" stroke-width="1"/>
  <text x="390" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e67700" font-weight="bold">Index Lookup</text>
  <text x="390" y="315" text-anchor="middle" font-family="monospace" font-size="8" fill="#495057">[1,2] ∩ [1,3] = [1]</text>
  
  <line x1="470" y1="305" x2="515" y2="305" stroke="#495057" stroke-width="2" marker-end="url(#invArrow)"/>
  
  <!-- Result -->
  <rect x="520" y="285" width="160" height="40" rx="6" fill="#d3f9d8" stroke="#40c057" stroke-width="1"/>
  <text x="600" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2b8a3e" font-weight="bold">✓ Result: doc_1</text>
  <text x="600" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#495057">O(1) lookup!</text>
  
  <!-- Benefit -->
  <text x="375" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#495057" font-weight="bold">Now search ONLY vectors matching filter, not all N vectors!</text>
</svg>
